<meta charset="utf-8">
<style>
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#262624; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }
.cl { width:1080px; height:1920px; background:#262624; display:flex; flex-direction:column; }
.cl-top { height:190px; display:flex; align-items:center; justify-content:space-between; padding:30px 44px 0; }
.cl-burger { width:104px; height:104px; border-radius:50%; background:#302f2c; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; }
.cl-burger div { height:4px; background:#c9c6bd; border-radius:2px; }
.cl-burger div:nth-child(1) { width:44px; }
.cl-burger div:nth-child(2) { width:30px; margin-right:14px; }
.cl-new { width:104px; height:104px; border-radius:50%; background:#302f2c; display:flex; align-items:center; justify-content:center; }
.cl-body { flex:1; padding:40px 52px; overflow:hidden; position:relative; }
.cl-composer-wrap { padding:24px 34px 40px; }
.cl-composer { background:#2e2d2a; border:2px solid #413f3a; border-radius:52px; padding:38px 34px 28px 44px; }
.cl-input { color:#8a867d; font-size:43px; min-height:60px; }
.cl-crow { display:flex; align-items:center; margin-top:30px; gap:22px; }
.cl-plus { width:84px; height:84px; border-radius:50%; background:#3a3936; color:#dcd9d0; font-size:52px; font-weight:300; display:flex; align-items:center; justify-content:center; }
.cl-model { background:#1f1e1c; border-radius:50px; padding:22px 36px; font-size:33px; color:#f0efea; font-weight:600; }
.cl-model span { color:#8a867d; font-weight:400; margin-left:12px; }
.cl-mic { width:84px; height:84px; border-radius:50%; background:#3a3936; display:flex; align-items:center; justify-content:center; margin-left:auto; }
.cl-mic svg { width:42px; height:42px; fill:#dcd9d0; }
.cl-orb { width:96px; height:96px; border-radius:50%; background:#f0efea; display:flex; align-items:center; justify-content:center; }
.cl-orb svg { width:44px; height:44px; fill:#1f1e1c; }
.u-bubble { background:#3d3c38; color:#f0efea; font-size:33px; line-height:1.5; padding:26px 38px; border-radius:38px; max-width:820px; margin-left:auto; }
.a-msg { color:#e8e6df; font-size:36px; line-height:1.6; margin-top:48px; }
.a-msg h2 { color:#d97757; font-size:40px; font-weight:600; margin:40px 0 10px; }
.a-msg p { color:#d6d3ca; margin:8px 0; }
.dot { display:inline-block; width:20px; height:20px; border-radius:50%; background:#d97757; margin-left:8px; vertical-align:-2px; }
.think { color:#8a867d; font-size:36px; }

.caret { display:inline-block; width:4px; height:46px; background:#f0efea; vertical-align:-9px; margin-left:2px; }

/* connectors screen */
.cn-title { font-family:Georgia,serif; color:#f0efea; font-size:72px; margin:26px 0 8px; }
.cn-sub { color:#8a867d; font-size:32px; margin-bottom:40px; }
.cn-row { background:#30302e; border:2px solid #45433f; border-radius:26px; padding:36px 40px; margin-bottom:26px; display:flex; align-items:center; gap:28px; }
.cn-ic { width:84px; height:84px; min-width:84px; border-radius:20px; background:#3d3c38; display:flex; align-items:center; justify-content:center; font-size:38px; color:#f0efea; font-weight:700; }
.cn-name { color:#f0efea; font-size:36px; font-weight:600; }
.cn-meta { color:#8a867d; font-size:27px; margin-top:6px; }
.cn-btn { margin-left:auto; background:#d97757; color:#fff; font-size:29px; font-weight:700; border-radius:40px; padding:18px 40px; }
.cn-btn.pressed { background:#c05f3f; transform:scale(0.96); }
.cn-ok { margin-left:auto; color:#59c97b; font-size:29px; font-weight:600; }
.cl-home2 { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:44px; }
.cl-greet2 { font-family:Georgia,serif; color:#f0efea; font-size:64px; }
/* flight cards */
.tool-chip { display:inline-flex; align-items:center; gap:18px; background:#30302e; border:2px solid #45433f; border-radius:40px; padding:18px 34px; color:#c9c6bd; font-size:29px; }
.spin { width:30px; height:30px; border:4px solid #45433f; border-top-color:#d97757; border-radius:50%; }
.fc { background:#30302e; border:2px solid #45433f; border-radius:24px; padding:30px 36px; margin-top:24px; display:flex; align-items:center; }
.fc.best { border-color:rgba(217,119,87,0.8); }
.fc-route { color:#f0efea; font-size:34px; font-weight:600; }
.fc-sub { color:#8a867d; font-size:26px; margin-top:8px; }
.fc-price { margin-left:auto; text-align:right; }
.fc-price .p { color:#f0efea; font-size:42px; font-weight:700; }
.fc-price .tag { color:#d97757; font-size:23px; font-weight:600; margin-top:4px; }
.link-btn { display:inline-flex; align-items:center; gap:16px; background:#d97757; color:#fff; font-size:31px; font-weight:700; border-radius:40px; padding:22px 42px; margin-top:30px; }
/* ============ iOS keyboard ============ */
.kb { background:#1c1c1e; overflow:hidden; }
.kb-inner { padding:16px 8px 20px; }
.kb-sugg { display:flex; align-items:center; height:100px; margin-bottom:10px; }
.kb-sugg span { flex:1; text-align:center; color:#ececec; font-size:38px; }
.kb-sugg .sep { width:2px; height:56px; background:#3a3a3c; flex:none; }
.kb-row { display:flex; justify-content:center; gap:11px; margin-bottom:18px; }
.kb-key { background:#3a3a3c; color:#fff; font-size:42px; border-radius:10px; width:94px; height:112px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #131315; }
.kb-key.hot { background:#7a7a80; }
.kb-key.wide { width:146px; background:#2a2a2c; font-size:32px; }
.kb-key.space { width:592px; }
.kb-key.ret { width:216px; background:#2a2a2c; }
.kb-bottom { display:flex; justify-content:space-between; padding:10px 60px 0; }
.kb-bottom svg { width:56px; height:56px; fill:none; stroke:#b8b8bd; stroke-width:1.8; }
.kb-home { width:300px; height:10px; background:#fff; border-radius:6px; margin:26px auto 0; }

</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const GHOST = `<svg viewBox="0 0 24 24" style="width:52px;height:52px;fill:none;stroke:#c9c6bd;stroke-width:1.7"><path d="M12 3.5a6.2 6.2 0 0 0-6.2 6.2V19l2.1-1.8 2 1.8 2.1-1.8 2.1 1.8 2-1.8 2.1 1.8V9.7A6.2 6.2 0 0 0 12 3.5z"/><circle cx="9.6" cy="10" r="0.9" fill="#c9c6bd"/><circle cx="14.4" cy="10" r="0.9" fill="#c9c6bd"/></svg>`;
const MIC = `<div class="cl-mic"><svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg></div>`;
const ORB = `<div class="cl-orb"><svg viewBox="0 0 24 24"><path d="M9 4h2v16H9zM4 9h2v6H4zM14 6h2v12h-2zM19 10h2v4h-2z"/></svg></div>`;

const KB_H = 760;
function keyboard(frac, hot) {
  if (frac <= 0) return '';
  const key = (c, cls) => `<div class="kb-key ${cls||''} ${hot===c?'hot':''}">${c}</div>`;
  const shift = `<div class="kb-key wide"><svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:#fff"><path d="M12 3l7 8h-4v6h-6v-6H5z"/></svg></div>`;
  const back = `<div class="kb-key wide"><svg viewBox="0 0 24 24" style="width:48px;height:48px;fill:#fff"><path d="M9 5l-6 7 6 7h12V5H9zm9.4 10l-1.4 1.4-2.6-2.6-2.6 2.6L10.4 15l2.6-2.6-2.6-2.6 1.4-1.4 2.6 2.6 2.6-2.6 1.4 1.4-2.6 2.6 2.6 2.6z"/></svg></div>`;
  const smiley = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="0.8" fill="#b8b8bd"/><circle cx="15" cy="10" r="0.8" fill="#b8b8bd"/><path d="M8 14.2a4.6 4.6 0 0 0 8 0"/></svg>`;
  const mic2 = `<svg viewBox="0 0 24 24"><rect x="9.4" y="3.5" width="5.2" height="11" rx="2.6"/><path d="M6 11.5a6 6 0 0 0 12 0M12 17.5V21"/></svg>`;
  const ret = `<div class="kb-key ret"><svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:#fff"><path d="M19 7v4a2 2 0 0 1-2 2H7.8l2.8 2.8-1.4 1.4L4 12l5.2-5.2 1.4 1.4L7.8 11H17V7h2z"/></svg></div>`;
  return `<div class="kb" style="height:${Math.round(KB_H*frac)}px"><div class="kb-inner">
    <div class="kb-sugg"><span>I</span><div class="sep"></div><span>The</span><div class="sep"></div><span>I'm</span></div>
    <div class="kb-row">${'QWERTYUIOP'.split('').map(c=>key(c)).join('')}</div>
    <div class="kb-row">${'ASDFGHJKL'.split('').map(c=>key(c)).join('')}</div>
    <div class="kb-row">${shift}${'ZXCVBNM'.split('').map(c=>key(c)).join('')}${back}</div>
    <div class="kb-row">${key('123','wide')}<div class="kb-key space ${hot===' '?'hot':''}"></div>${ret}</div>
    <div class="kb-bottom">${smiley}${mic2}</div>
    <div class="kb-home"></div></div></div>`;
}


const SPARK = `<img src="claude_spark.png" style="width:150px;height:150px">`;
const PROMPT75 = "Find me the cheapest flight from London to Dubai in the next 30 days and give me the official link to book it";

function chrome(bodyHTML, composerHTML, kbHTML) {
  return `<div class="cl"><div class="cl-top"><div class="cl-burger"><div></div><div></div></div><div class="cl-new">${GHOST}</div></div>
    <div class="cl-body" id="body">${bodyHTML}</div>
    ${composerHTML || ''}${kbHTML || ''}</div>`;
}
function composer75(txt, ready) {
  const right = ready ? `<div style="width:96px;height:96px;min-width:96px;border-radius:50%;background:#d97757;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:#fff"><path d="M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z"/></svg></div>` : ORB;
  return `<div class="cl-composer-wrap"><div class="cl-composer"><div class="cl-input">${txt}</div>
    <div class="cl-crow"><div class="cl-plus">+</div><div class="cl-model">Fable 5<span>High</span></div>${MIC}${right}</div></div></div>`;
}

/* Scene A (4.1s): home -> Connectors -> connect Turkish Airlines */
function sceneA(t) {
  if (t < 1.0) {
    stage.innerHTML = chrome(`<div class="cl-home2">${SPARK}<div class="cl-greet2">Evening, Nathan</div></div>`,
      composer75('<span style="color:#8a867d">Chat with Claude</span>', false), '');
    return;
  }
  const pressed = t >= 3.0 && t < 3.35;
  const connected = t >= 3.35;
  const ta = connected ? `<div class="cn-ok">Connected</div>`
    : `<div class="cn-btn ${pressed?'pressed':''}">Connect</div>`;
  stage.innerHTML = chrome(`
    <div class="cn-title">Connectors</div>
    <div class="cn-sub">Extend Claude with your favorite services</div>
    <div class="cn-row"><div class="cn-ic">&#9650;</div><div><div class="cn-name">Google Drive</div><div class="cn-meta">Search and reference your files</div></div><div class="cn-ok">Connected</div></div>
    <div class="cn-row"><div class="cn-ic">M</div><div><div class="cn-name">Gmail</div><div class="cn-meta">Read and draft emails</div></div><div class="cn-ok">Connected</div></div>
    <div class="cn-row" style="${connected||pressed ? 'border-color:rgba(217,119,87,0.7);' : ''}"><div class="cn-ic">TK</div><div><div class="cn-name">Turkish Airlines</div><div class="cn-meta">Search and book flights</div></div>${ta}</div>`, '', '');
}

/* Scene B (8.2s): typing the prompt with keyboard */
function sceneB(t) {
  const typeStart = 0.6, typeEnd = 6.8, sendAt = 7.2;
  const dt = (typeEnd - typeStart) / PROMPT75.length;
  let n = Math.max(0, Math.min(PROMPT75.length, Math.floor(((t - typeStart) / (typeEnd - typeStart)) * PROMPT75.length)));
  if (t >= typeEnd) n = PROMPT75.length;
  const typed = PROMPT75.slice(0, n);
  const sent = t >= sendAt;
  let hot = null;
  if (n > 0) {
    const appear = typeStart + (n - 1) * dt;
    if (t - appear < Math.min(0.11, dt * 0.9)) hot = PROMPT75[n - 1].toUpperCase();
  }
  const caretOn = (t % 0.9) < 0.55;
  const caret = `<span class="caret" style="opacity:${caretOn?1:0}"></span>`;
  let kh = 0;
  if (t < 0.2) kh = 0; else if (t < 0.4) kh = (t - 0.2) / 0.2;
  else if (t < 7.25) kh = 1; else kh = Math.max(0, 1 - (t - 7.25) / 0.2);
  const body = sent ? `<div class="u-bubble">${PROMPT75}</div>` : '';
  const inputTxt = sent ? `<span style="color:#8a867d">Reply to Claude</span>` : (typed.length ? `${typed}${caret}` : `<span style="color:#8a867d">Chat with Claude</span>${caret}`);
  stage.innerHTML = chrome(body, composer75(inputTxt, !sent && typed.length > 0), keyboard(kh, hot));
}

/* Scene C (9.8s): searching -> flight cards -> official link */
const FLIGHTS = [
  ["LHR &rarr; DXB &middot; Jul 18", "14:25 &ndash; 00:55 &middot; 30kg checked &middot; 8kg cabin", "$164", true],
  ["LHR &rarr; DXB &middot; Jul 22", "11:10 &ndash; 21:35 &middot; 30kg checked &middot; 8kg cabin", "$189", false],
  ["LHR &rarr; DXB &middot; Jul 29", "08:45 &ndash; 19:10 &middot; 30kg checked &middot; 8kg cabin", "$203", false]
];
function sceneC(t) {
  let ai = '';
  if (t < 1.2) {
    ai = `<div class="tool-chip"><div class="spin" style="transform:rotate(${(t*480).toFixed(0)}deg)"></div>Searching Turkish Airlines flights&#8230;</div>`;
  } else {
    const tf = Math.min(1, (t - 1.2) / 0.5);
    const TITLE = "Here are the cheapest London &rarr; Dubai flights in the next 30 days:";
    ai = `<div class="a-msg" style="margin-top:30px"><p>${TITLE.slice(0, Math.floor(TITLE.length*tf))}</p></div>`;
    FLIGHTS.forEach(([route, sub, price, best], i) => {
      const st = 1.9 + i * 0.7;
      if (t >= st) {
        const f = Math.min(1, (t - st) / 0.3);
        const hl = best && t >= 3.9;
        ai += `<div class="fc ${hl?'best':''}" style="opacity:${f.toFixed(2)};transform:translateY(${(20*(1-f)).toFixed(1)}px)">
          <div><div class="fc-route">${route}</div><div class="fc-sub">${sub}</div></div>
          <div class="fc-price"><div class="p">${price}</div>${hl ? '<div class="tag">CHEAPEST</div>' : ''}</div></div>`;
      }
    });
    if (t >= 6.0) {
      const f = Math.min(1, (t - 6.0) / 0.35);
      ai += `<div style="opacity:${f.toFixed(2)}"><div class="link-btn">Book on turkishairlines.com &#8599;</div></div>`;
    }
  }
  const body = `<div style="position:absolute;left:52px;right:52px;top:20px">
    <div class="u-bubble" style="font-size:31px">${PROMPT75}</div>${ai}</div>`;
  stage.innerHTML = chrome(body, composer75('<span style="color:#8a867d">Reply to Claude</span>', false), '');
}

window.seek = (scene, t) => {
  ({A: sceneA, B: sceneB, C: sceneC})[scene](t);
  return true;
};
</script>
