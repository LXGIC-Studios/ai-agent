<meta charset="utf-8">
<style>
@font-face { font-family:'Anton'; src:url('fonts/Anton-400.ttf'); }
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; }

/* ---- numbered step pill (reference 2) ---- */
.pill-wrap { position:absolute; left:0; top:1100px; width:1080px; display:flex; justify-content:center; }
.pill { background:rgba(11,11,13,0.68); border:1.5px solid rgba(255,255,255,0.22); border-radius:24px;
  padding:30px 52px; display:inline-flex; align-items:center; gap:36px;
  box-shadow:0 12px 44px rgba(0,0,0,0.45); }
.pill-num { font-family:'Anton'; font-size:64px; color:#F0A13C; line-height:1; }
.pill-div { width:2px; align-self:stretch; background:rgba(255,255,255,0.18); border-radius:1px; }
.pill-txt .strike { position:relative; }
.pill-txt .strike:after { content:''; position:absolute; left:-6px; right:-6px; top:53%; height:5px; background:#F0A13C; border-radius:3px; transform:rotate(-1.5deg); }
.pill-txt .org { color:#F0A13C; }
.pill-txt { font-family:'Archivo'; font-weight:900; font-size:36px; color:#f4f2ee; line-height:1.38; letter-spacing:4px;
  text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55); }

/* ---- floating prompt card (reference 1) ---- */
.card-wrap { position:absolute; left:50%; top:1000px; width:880px; }
.card { position:relative; background:#fdfdfc; border-radius:28px; padding:50px 56px; overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,0.6), 0 4px 18px rgba(0,0,0,0.35); }
.card.hot { box-shadow:0 30px 90px rgba(0,0,0,0.6), 0 0 0 5px #F0A13C; }
.card-wm { position:absolute; right:18px; top:-38px; font-family:'Anton'; font-size:230px; color:#f0efec;
  line-height:1; letter-spacing:-4px; z-index:0; }
.card-head { position:relative; z-index:1; display:flex; align-items:center; gap:22px; margin-bottom:24px; }
.card-badge { background:#1f1e1c; color:#fff; font-family:'Archivo'; font-weight:900; font-size:27px;
  letter-spacing:3px; padding:12px 26px; border-radius:12px; }
.card-badge.hot { background:#F0A13C; color:#1f1e1c; }
.card-app { color:#8a867d; font-family:'Inter'; font-weight:600; font-size:27px; }
.card-body { position:relative; z-index:1; font-family:'Inter'; font-weight:600; font-size:38px; color:#191919; line-height:1.42; }
.card-body .q { color:#b0b0ab; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');

const PILLS = {
  t1: ["", "THE 3-PROMPT STRATEGY"],
  p1: ["01", "THE FASTEST PATH"],
  p2: ["02", "THE RIGHT MENTOR"],
  p3: ["03", "THE MOST IMPORTANT"],
  x1: ["", "<span class='strike'>GENERIC ADVICE</span>"],
  x2: ["", "TAILORED. SPECIFIC. <span class='org'>YOURS.</span>"],
  cta: ["", "PROMPTS IN THE <span class='org'>COMMENTS</span>"]
};
const CARDS = {
  c1: ["PROMPT 01", "01", "What is the fastest way for me to reach my desired income?", false],
  c2: ["PROMPT 02", "02", "Who is the most successful entrepreneur I should learn from?", false],
  c3: ["PROMPT 03", "03", "Pretend you are that entrepreneur. Create me a 90-day action plan with a $5,000 upfront budget, and show me exactly how to get my first client.", true]
};

// pop animation: scale/fade in with overshoot, subtle idle drift, no exit (cut out)
function anim(t) {
  const IN = 0.32;
  let s, o, dy;
  if (t < IN) {
    const p = t / IN;
    const e = 1 - Math.pow(1 - p, 4);            // ease-out quart, no bounce
    s = 0.965 + 0.035 * e;
    o = e;
    dy = 30 * (1 - e);
  } else {
    s = 1.0; o = 1; dy = 0;                       // dead still = elegant
  }
  return { s, o, dy };
}

window.seek = (kind, t, dur) => {
  let { s, o, dy } = anim(t);
  if (dur && t > dur - 0.22) {
    const p = (t - (dur - 0.22)) / 0.22;
    o = o * (1 - p);
  }
  if (PILLS[kind]) {
    const [num, txt] = PILLS[kind];
    const numHtml = num ? `<div class="pill-num">${num}</div><div class="pill-div"></div>` : '';
    const just = num ? '' : 'justify-content:center;text-align:center;';
    stage.innerHTML = `<div class="pill-wrap" style="transform:translateY(${dy.toFixed(1)}px) scale(${s.toFixed(4)}); opacity:${o.toFixed(3)}">
      <div class="pill" style="${just}">${numHtml}<div class="pill-txt">${txt}</div></div></div>`;
  } else {
    const [badge, wm, body, hot] = CARDS[kind];
    stage.innerHTML = `<div class="card-wrap" style="transform:translateX(-50%) translateY(${dy.toFixed(1)}px) scale(${s.toFixed(4)}); opacity:${o.toFixed(3)}">
      <div class="card ${hot?'hot':''}"><div class="card-wm">${wm}</div>
      <div class="card-head"><div class="card-badge ${hot?'hot':''}">${badge}</div><div class="card-app">Claude</div></div>
      <div class="card-body"><span class="q">&ldquo;</span>${body}<span class="q">&rdquo;</span></div></div></div>`;
  }
  return true;
};
</script>
