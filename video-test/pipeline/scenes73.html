<meta charset="utf-8">
<style>
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-700.ttf'); font-weight:700; }
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-900.ttf'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#262624; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }

/* ============ Claude dark mobile UI ============ */
.cl { width:1080px; height:1920px; background:#262624; display:flex; flex-direction:column; }
.statusbar { height:100px; display:flex; align-items:center; justify-content:space-between; padding:14px 70px 0; }
.st-time { color:#f0efea; font-size:40px; font-weight:700; }
.st-icons { display:flex; align-items:center; gap:16px; }
.cl-top { height:190px; display:flex; align-items:center; justify-content:space-between; padding:30px 44px 0; }
.cl-burger { width:104px; height:104px; border-radius:50%; background:#302f2c; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; box-shadow:0 2px 10px rgba(0,0,0,.25); }
.cl-burger div { height:4px; background:#c9c6bd; border-radius:2px; }
.cl-burger div:nth-child(1) { width:44px; }
.cl-burger div:nth-child(2) { width:30px; margin-right:14px; }
.cl-new { width:104px; height:104px; border-radius:50%; background:#302f2c; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 10px rgba(0,0,0,.25); }
.cl-body { flex:1; padding:40px 52px; overflow:hidden; position:relative; }
.cl-composer-wrap { padding:24px 34px 40px; }
.cl-composer { background:#2e2d2a; border:2px solid #413f3a; border-radius:52px; padding:38px 34px 28px 44px; }
.cl-input { color:#f0efea; font-size:43px; line-height:1.4; word-break:break-word; min-height:60px; }
.cl-input .ph { color:#8a867d; }
.cl-crow { display:flex; align-items:center; margin-top:30px; gap:22px; }
.cl-plus { width:84px; height:84px; min-width:84px; border-radius:50%; background:#3a3936; color:#dcd9d0; font-size:52px; font-weight:300; display:flex; align-items:center; justify-content:center; }
.cl-model { background:#1f1e1c; border-radius:50px; padding:22px 36px; font-size:33px; color:#f0efea; font-weight:600; }
.cl-model span { color:#8a867d; font-weight:400; margin-left:12px; }
.cl-mic { width:84px; height:84px; min-width:84px; border-radius:50%; background:#3a3936; display:flex; align-items:center; justify-content:center; margin-left:auto; }
.cl-mic svg { width:42px; height:42px; fill:#dcd9d0; }
.cl-orb { width:96px; height:96px; min-width:96px; border-radius:50%; background:#f0efea; display:flex; align-items:center; justify-content:center; }
.cl-orb svg { width:44px; height:44px; fill:#1f1e1c; }
.caret { display:inline-block; width:4px; height:46px; background:#f0efea; vertical-align:-9px; margin-left:2px; }
.cl-send { width:80px; height:80px; min-width:80px; border-radius:50%; background:#d97757; display:flex; align-items:center; justify-content:center; margin-left:14px; }
.cl-send svg { width:40px; height:40px; fill:#fff; }
.cl-send.idle { background:#3a3936; }
.cl-send.idle svg { fill:#8a867d; }

.u-bubble { background:#3d3c38; color:#f0efea; font-size:35px; line-height:1.5; padding:28px 40px; border-radius:38px; max-width:800px; margin-left:auto; }
.a-msg { color:#e8e6df; font-size:34px; line-height:1.58; margin-top:48px; max-width:980px; }
.a-msg p { color:#d6d3ca; margin:12px 0; }
.a-msg ul { padding-left:44px; margin:10px 0; }
.a-msg li { color:#d6d3ca; margin:10px 0; }
.a-msg li::marker { color:#d97757; }
.stream-dot { display:inline-block; width:20px; height:20px; border-radius:50%; background:#d97757; margin-left:8px; vertical-align:-2px; }
.think { color:#8a867d; font-size:34px; }
.shimmer { background:linear-gradient(90deg,#8a867d 30%,#f0efea 50%,#8a867d 70%); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; }

/* Claude home */
.cl-home { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:44px; }
.cl-greet { font-family:Georgia,serif; color:#f0efea; font-size:64px; }
.starburst { width:150px; height:150px; }

/* Artifacts screen */
.art-title { font-family:Georgia,serif; color:#f0efea; font-size:72px; margin:30px 0 8px; }
.art-sub { color:#8a867d; font-size:32px; margin-bottom:44px; }
.art-card { background:#30302e; border:2px solid #45433f; border-radius:28px; padding:40px 44px; margin-bottom:28px; display:flex; align-items:center; gap:30px; }
.art-ic { width:84px; height:84px; min-width:84px; border-radius:20px; background:#3d3c38; display:flex; align-items:center; justify-content:center; color:#d97757; font-size:36px; font-weight:700; }
.art-name { color:#f0efea; font-size:37px; font-weight:600; }
.art-meta { color:#8a867d; font-size:28px; margin-top:6px; }
.art-new { background:#d97757; color:#fff; font-size:38px; font-weight:700; border-radius:60px; padding:34px 0; text-align:center; margin-top:40px; }
.art-new.pressed { background:#c05f3f; transform:scale(0.98); }

/* artifact generating card */
.gen-card { background:#30302e; border:2px solid #45433f; border-radius:26px; padding:34px 40px; margin-top:30px; max-width:860px; }
.gen-row { display:flex; align-items:center; gap:26px; }
.gen-ic { width:80px; height:80px; min-width:80px; border-radius:18px; background:#1f1e1c; display:flex; align-items:center; justify-content:center; color:#d97757; font-size:32px; font-weight:700; font-family:monospace; }
.gen-name { color:#f0efea; font-size:36px; font-weight:600; }
.gen-status { color:#8a867d; font-size:28px; margin-top:6px; }
.gen-bar { height:10px; background:#1f1e1c; border-radius:6px; margin-top:26px; overflow:hidden; }
.gen-fill { height:100%; background:linear-gradient(90deg,#d97757,#e8956f); border-radius:6px; }
.gen-code { margin-top:24px; font-family:monospace; font-size:24px; color:#6f6c64; line-height:1.6; overflow:hidden; max-height:150px; }

/* ============ iOS keyboard ============ */
.kb { background:#1c1c1e; overflow:hidden; }
.kb-inner { padding:16px 8px 20px; }
.kb-sugg { display:flex; align-items:center; height:100px; margin-bottom:10px; }
.kb-sugg span { flex:1; text-align:center; color:#ececec; font-size:38px; }
.kb-sugg .sep { width:2px; height:56px; background:#3a3a3c; flex:none; }
.kb-row { display:flex; justify-content:center; gap:11px; margin-bottom:18px; }
.kb-key { background:#3a3a3c; color:#fff; font-size:42px; border-radius:10px; width:94px; height:112px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 0 #131315; }
.kb-key.hot { background:#7a7a80; }
.kb-key.wide { width:146px; background:#2a2a2c; font-size:32px; }
.kb-key.space { width:592px; }
.kb-key.ret { width:216px; background:#2a2a2c; }
.kb-bottom { display:flex; justify-content:space-between; padding:10px 60px 0; }
.kb-bottom svg { width:56px; height:56px; fill:none; stroke:#b8b8bd; stroke-width:1.8; }
.kb-home { width:300px; height:10px; background:#fff; border-radius:6px; margin:26px auto 0; }

/* ============ Tetris preview ============ */
.pv { width:1080px; height:1920px; background:#262624; display:flex; flex-direction:column; }
.pv-head { height:130px; display:flex; align-items:center; padding:0 44px; gap:24px; border-bottom:2px solid #33322f; }
.pv-back { color:#8a867d; font-size:52px; }
.pv-title { color:#f0efea; font-size:38px; font-weight:600; }
.pv-pills { margin-left:auto; display:flex; background:#1f1e1c; border-radius:40px; padding:6px; }
.pv-pill { color:#8a867d; font-size:30px; padding:14px 34px; border-radius:34px; }
.pv-pill.on { background:#3d3c38; color:#f0efea; font-weight:600; }
.game { flex:1; background:radial-gradient(ellipse at 50% 0%, #1d1133 0%, #120a24 55%, #0c0618 100%); display:flex; flex-direction:column; align-items:center; padding-top:34px; position:relative; }
.g-title { font-family:'Montserrat'; font-weight:900; font-size:74px; letter-spacing:14px; background:linear-gradient(180deg,#e9d5ff,#a855f7 55%,#7c3aed); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 60px rgba(168,85,247,.35); }
.g-hud { display:flex; gap:26px; margin:26px 0 24px; }
.g-stat { background:rgba(124,58,237,.12); border:2px solid rgba(168,85,247,.45); border-radius:18px; padding:16px 30px; text-align:center; }
.g-stat .lab { color:#c4b5fd; font-size:22px; letter-spacing:3px; font-weight:600; }
.g-stat .val { color:#fff; font-size:40px; font-weight:700; font-family:'Montserrat'; margin-top:4px; }
.g-wrap { display:flex; gap:26px; align-items:flex-start; }
.board { position:relative; width:622px; height:994px; background:rgba(10,4,24,.85); border:3px solid rgba(168,85,247,.6); border-radius:14px; box-shadow:0 0 80px rgba(124,58,237,.35), inset 0 0 60px rgba(88,28,135,.25); overflow:hidden; }
.cell { position:absolute; width:58px; height:58px; border-radius:9px; }
.next-box { background:rgba(124,58,237,.12); border:2px solid rgba(168,85,247,.45); border-radius:18px; padding:20px 24px; width:190px; }
.next-box .lab { color:#c4b5fd; font-size:22px; letter-spacing:3px; font-weight:600; text-align:center; }
.next-grid { position:relative; height:130px; margin-top:14px; }
.next-grid .cell { width:44px; height:44px; border-radius:7px; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const TYPED = "Create a fully playable Tetris game with a premium purple theme";

const STATUS = `<div class="statusbar"><span class="st-time">3:56</span>
  <span class="st-icons">
  <svg viewBox="0 0 40 24" style="width:44px;height:28px"><rect x="0" y="14" width="6" height="8" rx="1.5" fill="#f0efea"/><rect x="10" y="10" width="6" height="12" rx="1.5" fill="#f0efea"/><rect x="20" y="5" width="6" height="17" rx="1.5" fill="#5b5b5f"/><rect x="30" y="0" width="6" height="22" rx="1.5" fill="#5b5b5f"/></svg>
  <svg viewBox="0 0 24 18" style="width:40px;height:30px"><path d="M12 15.5l3.5-4.2a5.4 5.4 0 0 0-7 0z" fill="#f0efea"/><path d="M12 9.5c1.9 0 3.7.7 5.1 1.9l2.3-2.8A11.4 11.4 0 0 0 12 5.8c-2.8 0-5.4 1-7.4 2.8l2.3 2.8A7.9 7.9 0 0 1 12 9.5z" fill="#f0efea"/></svg>
  <svg viewBox="0 0 54 24" style="width:56px;height:26px"><rect x="1" y="1" width="44" height="22" rx="7" fill="none" stroke="#8e8e93" stroke-width="2"/><rect x="4" y="4" width="30" height="16" rx="4" fill="#f0efea"/><path d="M48 8v8a5 5 0 0 0 0-8z" fill="#8e8e93"/></svg>
  </span></div>`;

const STAR = (() => {
  let rays = '';
  for (let k = 0; k < 9; k++) {
    const a = (k / 9) * Math.PI * 2 + 0.25;
    const x1 = 12 + Math.cos(a) * 2.2, y1 = 12 + Math.sin(a) * 2.2;
    const x2 = 12 + Math.cos(a + 0.28) * 9.6, y2 = 12 + Math.sin(a + 0.28) * 9.6;
    rays += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#e0714f" stroke-width="1.7" stroke-linecap="round"/>`;
  }
  return `<svg class="starburst" viewBox="0 0 24 24">${rays}</svg>`;
})();
const GHOST = `<svg viewBox="0 0 24 24" style="width:52px;height:52px;fill:none;stroke:#c9c6bd;stroke-width:1.7"><path d="M12 3.5a6.2 6.2 0 0 0-6.2 6.2V19l2.1-1.8 2 1.8 2.1-1.8 2.1 1.8 2-1.8 2.1 1.8V9.7A6.2 6.2 0 0 0 12 3.5z"/><circle cx="9.6" cy="10" r="0.9" fill="#c9c6bd"/><circle cx="14.4" cy="10" r="0.9" fill="#c9c6bd"/></svg>`;
const SEND = `<div class="cl-send"><svg viewBox="0 0 24 24"><path d="M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z"/></svg></div>`;
const SENDIDLE = `<div class="cl-send idle"><svg viewBox="0 0 24 24"><path d="M12 4l7 7-1.4 1.4L13 7.8V20h-2V7.8l-4.6 4.6L5 11z"/></svg></div>`;

function clChrome(bodyHTML, composerHTML, kbHTML) {
  return `<div class="cl">
    <div class="cl-top"><div class="cl-burger"><div></div><div></div></div>
    <div class="cl-new">${GHOST}</div></div>
    <div class="cl-body" id="body">${bodyHTML}</div>
    ${composerHTML ? `<div class="cl-composer-wrap">${composerHTML}</div>` : ''}${kbHTML || ''}</div>`;
}
const MICBTN = `<div class="cl-mic"><svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg></div>`;
const ORBBTN = `<div class="cl-orb"><svg viewBox="0 0 24 24"><path d="M9 4h2v16H9zM4 9h2v6H4zM14 6h2v12h-2zM19 10h2v4h-2z"/></svg></div>`;
function composer(txt, ready) {
  const right = ready ? SEND : ORBBTN;
  return `<div class="cl-composer"><div class="cl-input">${txt}</div>
    <div class="cl-crow"><div class="cl-plus">+</div><div class="cl-model">Fable 5<span>High</span></div>${MICBTN}${right}</div></div>`;
}

const KB_H = 760;
function keyboard(frac, hot) {
  if (frac <= 0) return '';
  const key = (c, cls) => `<div class="kb-key ${cls||''} ${hot===c?'hot':''}">${c}</div>`;
  const shift = `<div class="kb-key wide"><svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:#fff"><path d="M12 3l7 8h-4v6h-6v-6H5z"/></svg></div>`;
  const back = `<div class="kb-key wide"><svg viewBox="0 0 24 24" style="width:48px;height:48px;fill:#fff"><path d="M9 5l-6 7 6 7h12V5H9zm9.4 10l-1.4 1.4-2.6-2.6-2.6 2.6L10.4 15l2.6-2.6-2.6-2.6 1.4-1.4 2.6 2.6 2.6-2.6 1.4 1.4-2.6 2.6 2.6 2.6z"/></svg></div>`;
  const smiley = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="0.8" fill="#b8b8bd"/><circle cx="15" cy="10" r="0.8" fill="#b8b8bd"/><path d="M8 14.2a4.6 4.6 0 0 0 8 0"/></svg>`;
  const mic2 = `<svg viewBox="0 0 24 24"><rect x="9.4" y="3.5" width="5.2" height="11" rx="2.6"/><path d="M6 11.5a6 6 0 0 0 12 0M12 17.5V21"/></svg>`;
  const ret = `<div class="kb-key ret"><svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:#fff"><path d="M19 7v4a2 2 0 0 1-2 2H7.8l2.8 2.8-1.4 1.4L4 12l5.2-5.2 1.4 1.4L7.8 11H17V7h2z"/></svg></div>`;
  return `<div class="kb" style="height:${Math.round(KB_H*frac)}px"><div class="kb-inner">
    <div class="kb-sugg"><span>I</span><div class="sep"></div><span>The</span><div class="sep"></div><span>I'm</span></div>
    <div class="kb-row">${'QWERTYUIOP'.split('').map(c=>key(c)).join('')}</div>
    <div class="kb-row">${'ASDFGHJKL'.split('').map(c=>key(c)).join('')}</div>
    <div class="kb-row">${shift}${'ZXCVBNM'.split('').map(c=>key(c)).join('')}${back}</div>
    <div class="kb-row">${key('123','wide')}<div class="kb-key space ${hot===' '?'hot':''}"></div>${ret}</div>
    <div class="kb-bottom">${smiley}${mic2}</div>
    <div class="kb-home"></div></div></div>`;
}

/* ---------- Scene A (8.0s): home -> Artifacts -> type prompt -> send ---------- */
function sceneA(t) {
  if (t < 1.5) {
    const body = `<div class="cl-home">${STAR}<div class="cl-greet">Evening, Nathan</div></div>`;
    stage.innerHTML = clChrome(body, composer(`<span class="ph">Chat with Claude</span>`, false), '');
    return;
  }
  if (t < 3.1) {
    const pressed = t >= 2.6;
    const body = `
      <div class="art-title">Artifacts</div>
      <div class="art-sub">Interactive apps, games, and tools you create with Claude</div>
      <div class="art-card"><div class="art-ic">&lt;/&gt;</div><div><div class="art-name">Landing page</div><div class="art-meta">HTML &middot; 3 days ago</div></div></div>
      <div class="art-card"><div class="art-ic">&#9638;</div><div><div class="art-name">Budget tracker</div><div class="art-meta">React &middot; last week</div></div></div>
      <div class="art-new ${pressed?'pressed':''}">+ New artifact</div>`;
    stage.innerHTML = clChrome(body, '', '');
    return;
  }
  // compose
  const typeStart = 3.5, typeEnd = 7.0, sendAt = 7.3;
  const dt = (typeEnd - typeStart) / TYPED.length;
  let n = Math.max(0, Math.min(TYPED.length, Math.floor(((t - typeStart) / (typeEnd - typeStart)) * TYPED.length)));
  if (t >= typeEnd) n = TYPED.length;
  const typed = TYPED.slice(0, n);
  const sent = t >= sendAt;
  let hot = null;
  if (n > 0) {
    const appear = typeStart + (n - 1) * dt;
    if (t - appear < Math.min(0.11, dt * 0.9)) hot = TYPED[n - 1].toUpperCase();
  }
  const caretOn = (t % 0.9) < 0.55;
  const caret = `<span class="caret" style="opacity:${caretOn?1:0}"></span>`;
  let kh = 0;
  if (t < 3.2) kh = 0;
  else if (t < 3.4) kh = (t - 3.2) / 0.2;
  else if (t < 7.35) kh = 1;
  else kh = Math.max(0, 1 - (t - 7.35) / 0.2);
  const body = sent
    ? `<div class="u-bubble">${TYPED}</div>`
    : `<div style="color:#8a867d;font-size:34px;margin-bottom:26px;font-family:Georgia,serif">New artifact</div>`;
  const inputTxt = sent ? `<span class="ph">Reply to Claude</span>`
    : (typed.length ? `${typed}${caret}` : `<span class="ph">Describe your artifact&#8230;</span>${caret}`);
  stage.innerHTML = clChrome(body, composer(inputTxt, !sent && typed.length > 0), keyboard(kh, hot));
}

/* ---------- Scene B (3.6s): plan -> Continue -> generating ---------- */
const PLAN_INTRO = "Here’s my plan for your Tetris game:";
const PLAN = [
  "10×20 board with smooth drop & lock",
  "All 7 tetromino pieces with rotation",
  "Scoring, levels, and line clears",
  "Premium purple theme with glow effects",
  "Keyboard + touch controls"
];
const CODE_LINES = ["const board = Array.from({length: 20},", "  () => Array(10).fill(0));", "const PIECES = { I: [[1,1,1,1]], O: [[1,1],[1,1]],", "  T: [[0,1,0],[1,1,1]], … };", "function spawn() { … }", "function clearLines() { … }"];
function sceneB(t) {
  const dotsEnd = 0.35, contAt = 2.1, genAt = 2.8;
  let ai = '';
  if (t < dotsEnd) {
    ai = `<span class="think shimmer" style="background-position:${(-200*t).toFixed(0)}% 0">Thinking&#8230;</span>`;
  } else {
    const f = Math.min(1, (t - dotsEnd) / 0.45);
    let parts = `<p>${PLAN_INTRO.slice(0, Math.floor(PLAN_INTRO.length*f))}</p>`;
    let lis = '';
    PLAN.forEach((p, i) => {
      const st = 0.8 + i * 0.16;
      if (t >= st) {
        const pf = Math.min(1, (t - st) / 0.3);
        lis += `<li>${p.slice(0, Math.floor(p.length*pf))}</li>`;
      }
    });
    if (lis) parts += `<ul>${lis}</ul>`;
    if (t >= 1.75) parts += `<p>Want me to continue and build it?</p>`;
    ai = parts;
  }
  let extra = '';
  if (t >= contAt) extra += `<div class="u-bubble" style="max-width:320px;margin-top:36px">Continue</div>`;
  if (t >= genAt) {
    const gf = Math.min(1, (t - genAt) / 0.8) * 0.45;
    const codeN = Math.floor((t - genAt) * 8);
    const code = CODE_LINES.slice(0, codeN).join('<br>');
    extra += `<div class="gen-card"><div class="gen-row"><div class="gen-ic">&lt;/&gt;</div>
      <div><div class="gen-name">Tetris Game</div><div class="gen-status">Generating&#8230;</div></div></div>
      <div class="gen-bar"><div class="gen-fill" style="width:${(gf*100).toFixed(0)}%"></div></div>
      <div class="gen-code">${code}</div></div>`;
  }
  const body = `<div id="inner" style="position:absolute;left:52px;right:52px;top:40px">
    <div class="u-bubble" style="font-size:33px">${TYPED}</div>
    <div class="a-msg">${ai}</div>${extra}</div>`;
  stage.innerHTML = clChrome(body, composer(`<span class="ph">Reply to Claude</span>`, false), '');
  const bodyEl = document.getElementById('body');
  const innerEl = document.getElementById('inner');
  const avail = bodyEl.clientHeight - 90;
  const h = innerEl.scrollHeight;
  if (h > avail) innerEl.style.top = (40 - (h - avail)) + 'px';
}

/* ---------- Scene C (5.87s): Tetris running in preview ---------- */
const CS = 62, CO = 2;  // cell size, offset
const PURP = ["#7c3aed","#a855f7","#8b5cf6","#c084fc","#6d28d9","#9333ea"];
// stacks: [row, col, colorIdx]
const STACK1 = [
  [15,0,0],[15,1,2],[15,2,1],[15,4,4],[15,5,0],[15,6,3],[15,8,2],[15,9,1],
  [14,0,3],[14,1,1],[14,5,2],[14,6,4],[14,9,0],
  [13,0,2],[13,6,1]
];
const STACK2 = [  // after row-15 clear: everything shifted down one
  [15,0,3],[15,1,1],[15,5,2],[15,6,4],[15,9,0],[15,3,5],
  [14,0,2],[14,6,1],[14,3,5],
  [13,3,5]
];
// pieces: {cells at landing, fall window [t0,t1], colorIdx, preClear}
const FALLS = [
  { cells:[[13,4],[13,5],[12,5],[13,3]], t0:0.15, t1:0.95, c:1, pre:true },   // T-ish left-center
  { cells:[[12,3],[13,3],[14,3],[15,3]], t0:1.10, t1:1.90, c:5, pre:true },   // I fills col3 hole -> clear
  { cells:[[14,7],[14,8],[15,7],[15,8]], t0:2.50, t1:3.30, c:0, pre:false },  // O right
  { cells:[[13,2],[14,2],[15,2],[13,1]], t0:3.50, t1:4.30, c:3, pre:false },  // J left
  { cells:[[14,9],[13,9],[13,8],[12,8]], t0:4.50, t1:5.30, c:2, pre:false },  // S right
  { cells:[[2,4],[2,5],[2,6],[1,5]], t0:5.45, t1:6.6, c:1, pre:false }        // T falling at end
];
const CLEAR_T = 1.95, CLEAR_END = 2.25;
const NEXTS = [[[0,0],[0,1],[1,0],[1,1]], [[0,1],[1,1],[2,1],[2,0]], [[0,0],[0,1],[0,2],[1,1]]];

function cellDiv(r, c, ci, cls, glowW) {
  const col = PURP[ci % PURP.length];
  const glow = glowW ? `box-shadow:0 0 34px 6px rgba(233,213,255,.9);background:#f5f0ff;` :
    `background:linear-gradient(145deg, ${col}, ${col}cc 60%, ${col}88); box-shadow:inset 0 3px 6px rgba(255,255,255,.35), inset 0 -4px 8px rgba(0,0,0,.4), 0 0 18px ${col}55;`;
  return `<div class="cell" style="left:${CO + c*CS}px; top:${CO + r*CS}px; ${glow}"></div>`;
}

function sceneC(t) {
  const cleared = t >= CLEAR_END;
  const flashing = t >= CLEAR_T && t < CLEAR_END;
  let cells = '';
  const stack = cleared ? STACK2 : STACK1;
  stack.forEach(([r, c, ci]) => {
    const fl = flashing && r === 15;
    cells += cellDiv(r, c, ci, '', fl);
  });
  FALLS.forEach((p, idx) => {
    if (idx === 1 && cleared) return;           // I-piece consumed by clear (bottom cell went, rest in STACK2)
    if (idx === 0 && cleared) { p.cells.forEach(([r,c]) => { cells += cellDiv(r+1, c, p.c); }); return; }
    if (t < p.t0) return;
    const prog = Math.min(1, (t - p.t0) / (p.t1 - p.t0));
    const dy = Math.round((1 - prog) * 11);
    p.cells.forEach(([r, c]) => {
      const rr = r - dy;
      if (rr >= 0) cells += cellDiv(rr, c, p.c, '', flashing && rr === 15);
    });
  });
  // score
  let score = 0;
  if (t >= 0.95) score += 40;
  if (t >= 1.90) score += 40;
  if (cleared) score += 100;
  if (t >= 3.30) score += 40;
  if (t >= 4.30) score += 40;
  if (t >= 5.30) score += 40;
  const lines = cleared ? 1 : 0;
  const nextIdx = Math.min(2, FALLS.filter(p => t >= p.t1).length % 3);
  let next = '';
  NEXTS[nextIdx].forEach(([r, c]) => {
    next += `<div class="cell" style="left:${30 + c*48}px; top:${10 + r*48}px; background:linear-gradient(145deg,#a855f7,#7c3aed); box-shadow:inset 0 2px 4px rgba(255,255,255,.3), 0 0 12px #a855f755;"></div>`;
  });
  stage.innerHTML = `<div class="pv">
    <div class="pv-head"><span class="pv-back">&#8249;</span><span class="pv-title">Tetris Game</span>
      <div class="pv-pills"><div class="pv-pill on">Preview</div><div class="pv-pill">Code</div></div></div>
    <div class="game">
      <div class="g-title">TETRIS</div>
      <div class="g-hud">
        <div class="g-stat"><div class="lab">SCORE</div><div class="val">${score}</div></div>
        <div class="g-stat"><div class="lab">LEVEL</div><div class="val">1</div></div>
        <div class="g-stat"><div class="lab">LINES</div><div class="val">${lines}</div></div>
      </div>
      <div class="g-wrap">
        <div class="board">${cells}</div>
        <div class="next-box"><div class="lab">NEXT</div><div class="next-grid">${next}</div></div>
      </div>
    </div></div>`;
}

window.seek = (scene, t) => {
  if (scene === 'A') sceneA(t);
  else if (scene === 'B') sceneB(t);
  else sceneC(t);
  return true;
};
</script>
