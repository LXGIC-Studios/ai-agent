<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.18,1.04,"What if I told you"],
 [1.04,1.52,"you could run"],
 [1.52,2.12,"|ChatGPT|"],
 [2.12,2.58,"on your PC"],
 [2.58,3.05,"for |free|?"],
 [3.29,4.35,"First, go to Google"],
 [4.35,4.95,"|Ollama|"],
 [4.95,5.69,"and download it"],
 [5.69,6.75,"then open Command Prompt"],
 [6.83,8.49,"and run |ollama run gemma:2b|"],
 [8.49,9.15,"to download it"],
 [9.15,10.05,"and start the |AI model|"],
 [10.59,11.51,"Next, install |Docker Desktop|"],
 [12.37,13.23,"open it and make sure"],
 [13.23,14.05,"it's running in the background"],
 [14.63,15.81,"After that, copy the command"],
 [15.81,16.99,"from the |GitHub link| below"],
 [17.83,18.61,"open command again"],
 [18.61,19.45,"and paste it there"],
 [20.05,21.20,"wait for it to finish setting up"],
 [21.59,22.35,"once it's running"],
 [22.53,23.15,"open |Docker Desktop|"],
 [23.75,24.55,"copy the |port link|"],
 [24.75,25.60,"and paste it into your browser"],
 [25.73,26.68,"and just like that"],
 [26.91,27.91,"you now have |ChatGPT|"],
 [27.91,29.15,"built directly into |your PC|"],
 [30.15,31.29,"this tool is |100% free|"],
 [31.29,32.07,"and now you have"],
 [32.15,33.13,"|ChatGPT| on your PC"],
 [33.41,34.25,"whenever you want"],
 [34.67,35.45,"I hope this helped you out"],
 [35.45,35.85,"and of course"],
 [35.85,36.35,"|follow along|"],
 [36.35,37.00,"for our |AI tutorials|"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
