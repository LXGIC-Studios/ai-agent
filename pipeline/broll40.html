<meta charset="utf-8">
<style>
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter7'; src:url('fonts/Inter-700.ttf'); }
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#fff; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }
.page { width:1080px; height:1920px; background:#fff; display:flex; flex-direction:column; }
.urlbar { height:104px; background:#f4f4f6; border-bottom:1px solid #e8e8ec; display:flex; align-items:center; justify-content:center; }
.urlbar div { background:#e6e6ea; border-radius:28px; padding:16px 60px; font-size:29px; color:#3a3a3e; font-weight:600; }
.hdr { display:flex; align-items:center; justify-content:space-between; padding:40px 52px 0; }
.wm { font-family:Georgia,serif; font-weight:700; font-size:46px; color:#111; }
.bg3 div { width:38px; height:3.5px; background:#222; border-radius:2px; margin:8px 0; }
.body { flex:1; padding:0 56px; }
.serif-h { font-family:Georgia,serif; font-weight:700; font-size:70px; color:#111; text-align:center; line-height:1.2; margin-top:120px; letter-spacing:-1px; }
.sub { color:#666; font-size:31px; text-align:center; line-height:1.55; margin:34px auto 0; max-width:820px; }
.chips2 { display:flex; flex-wrap:wrap; gap:18px; justify-content:center; margin-top:52px; }
.chips2 div { background:#f2f2f4; border-radius:18px; padding:22px 34px; font-size:28px; color:#333; }
.teal-btn { display:flex; justify-content:center; margin-top:64px; }
.teal-btn div { background:#17A78C; color:#fff; font-size:34px; font-weight:700; border-radius:16px; padding:32px 64px; }
.nocc { text-align:center; color:#8a8a94; font-size:26px; margin-top:24px; }
.stats { display:flex; justify-content:center; gap:44px; margin-top:44px; }
.stats div { text-align:center; }
.stats b { display:block; font-size:33px; color:#111; }
.stats span { font-size:24px; color:#8a8a94; }
/* upload / prompt */
.upchips { display:flex; gap:16px; margin-top:40px; }
.upchips div { border:1.5px solid #ddd; border-radius:30px; padding:16px 30px; font-size:26px; color:#444; }
.upchips .on { background:#e7f5f1; border-color:#17A78C; color:#0d6e5c; font-weight:600; }
.photo-card { border-radius:28px; overflow:hidden; margin-top:36px; position:relative; }
.photo-card img { width:100%; display:block; }
.ptag { position:absolute; top:22px; left:22px; background:#fff; border-radius:26px; padding:12px 26px; font-size:24px; color:#333; font-weight:600; display:flex; align-items:center; gap:12px; }
.ptag i { width:16px; height:16px; border-radius:5px; background:#17A78C; display:inline-block; }
.prompt { display:flex; align-items:center; gap:20px; background:#f2f7f6; border:1.5px solid #cfe8e2; border-radius:44px; padding:24px 30px; margin-top:32px; }
.prompt .tx { flex:1; font-size:30px; color:#111; }
.prompt .tx .ph { color:#9ab5ae; }
.prompt .send { width:70px; height:70px; min-width:70px; border-radius:50%; background:#17A78C; display:flex; align-items:center; justify-content:center; }
.prompt .send svg { width:32px; height:32px; stroke:#fff; fill:none; stroke-width:2.4; }
.note { color:#8a8a94; font-size:26px; margin-top:24px; text-align:center; }
.shimmer { border-radius:28px; margin-top:36px; height:620px; background:linear-gradient(110deg,#eef2f1 30%,#f7faf9 45%,#eef2f1 60%); display:flex; align-items:center; justify-content:center; color:#7fa79e; font-size:31px; }
.stylechip { display:flex; justify-content:center; margin-top:30px; }
.stylechip div { background:#e7f5f1; border:2px solid #17A78C; color:#0d6e5c; border-radius:34px; padding:16px 38px; font-size:28px; font-weight:700; }
.dlrow { display:flex; gap:20px; justify-content:center; margin-top:32px; }
.dlrow .dl { background:#17A78C; color:#fff; border-radius:16px; padding:24px 44px; font-size:29px; font-weight:700; }
.dlrow .rd { border:2px solid #ddd; color:#444; border-radius:16px; padding:24px 44px; font-size:29px; }
/* app: upload + design companion */
.apphdr { display:flex; align-items:center; padding:34px 52px 0; }
.apphdr .wm { font-size:44px; }
.apphdr .rt { margin-left:auto; display:flex; align-items:center; gap:20px; }
.apphdr .ic4 { width:74px; height:74px; border-radius:50%; border:2.5px solid #17A78C; display:flex; align-items:center; justify-content:center; }
.apphdr .ic4 svg { width:36px; height:36px; stroke:#17A78C; fill:none; stroke-width:2; }
.apphdr .av { width:74px; height:74px; border-radius:50%; background:#141a35; color:#fff; font-family:Georgia,serif; font-size:38px; display:flex; align-items:center; justify-content:center; }
.serif-h2 { font-family:Georgia,serif; font-weight:700; font-size:64px; color:#141a35; text-align:center; margin-top:90px; }
.sub2 { text-align:center; font-size:31px; color:#333; font-weight:600; margin-top:26px; }
.sub3 { text-align:center; font-size:28px; color:#8a8a94; margin-top:18px; line-height:1.5; }
.dropz { border:4px dashed #9fd9cf; background:#f4fbf9; border-radius:24px; margin-top:50px; padding:60px 50px; text-align:center; }
.dropz .cl { margin:0 auto 34px; width:90px; height:90px; }
.dropz .cl svg { width:90px; height:90px; stroke:#17A78C; fill:none; stroke-width:1.8; }
.dropz .d1 { font-size:29px; color:#555; line-height:1.55; }
.dropz .d2 { font-size:26px; color:#8a8a94; margin-top:20px; line-height:1.5; }
.upbtn { background:#141a35; color:#fff; border-radius:48px; padding:30px; text-align:center; font-size:33px; font-weight:700; margin-top:44px; }
.dc-top { display:flex; align-items:center; gap:24px; padding:30px 52px 0; }
.dc-back { width:66px; height:66px; border:1.5px solid #ddd; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:34px; color:#333; }
.dc-t { font-size:40px; font-weight:700; color:#141a35; }
.dc-sub { display:flex; align-items:center; gap:22px; padding:20px 52px 0; }
.dc-on { color:#1c9e5a; font-size:28px; font-weight:600; }
.dc-on i { display:inline-block; width:16px; height:16px; border-radius:50%; background:#1c9e5a; margin-right:10px; }
.freep { background:#f2fbf7; border:1.5px solid #cdeee0; border-radius:36px; padding:14px 30px; display:flex; align-items:center; gap:16px; }
.freep .sp2 { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#28c58a,#17A78C); display:flex; align-items:center; justify-content:center; color:#fff; font-size:24px; }
.freep b { font-size:27px; color:#141a35; }
.freep span { font-size:21px; color:#8a8a94; margin-left:8px; letter-spacing:1px; }
.dc-photo { display:flex; justify-content:flex-end; padding:36px 52px 0; }
.dc-photo .pw { width:62%; border-radius:20px; overflow:hidden; position:relative; }
.dc-photo img { width:100%; display:block; }
.dc-photo .otag { position:absolute; bottom:16px; left:0; right:0; text-align:center; color:#fff; font-size:26px; font-weight:700; letter-spacing:2px; text-shadow:0 2px 10px rgba(0,0,0,0.6); }
.dc-photo .etag { position:absolute; top:14px; right:14px; width:60px; height:60px; border-radius:14px; background:linear-gradient(135deg,#28c58a,#17A78C); }
.dc-msg { margin:34px 52px 0; background:#fff; border:1.5px solid #e5e5ea; border-radius:24px; padding:32px 36px; font-size:30px; color:#141a35; line-height:1.5; max-width:760px; box-shadow:0 4px 18px rgba(20,26,53,0.05); }
.dc-bubble { margin:30px 52px 0; display:flex; justify-content:flex-end; }
.dc-bubble .in2 { background:#eef8f5; border:1.5px solid #bfe5db; border-radius:24px 24px 6px 24px; padding:28px 34px; font-size:30px; color:#141a35; max-width:720px; }
.composer { position:absolute; left:30px; right:30px; bottom:40px; background:#fff; border:2px solid #17A78C; border-radius:28px; padding:26px 30px; }
.composer .ph2 { font-size:31px; color:#9a9aa4; font-style:italic; }
.composer .tx2 { font-size:31px; color:#141a35; }
.composer .crow2 { display:flex; align-items:center; margin-top:24px; gap:16px; }
.composer .newp { background:linear-gradient(90deg,#a97af8,#f66bb0); color:#fff; border-radius:30px; padding:12px 30px; font-size:26px; font-weight:700; }
.composer .cnt { margin-left:auto; color:#8a8a94; font-size:25px; }
.composer .send2 { width:74px; height:74px; border-radius:50%; background:#7ed3c6; display:flex; align-items:center; justify-content:center; }
.composer .send2 svg { width:34px; height:34px; stroke:#fff; fill:none; stroke-width:2.6; }
.dc-note { position:absolute; left:0; right:0; bottom:10px; text-align:center; font-size:22px; color:#8a8a94; }
/* offer cards */
.hero-t { font-family:'Archivo'; font-size:54px; color:#17171f; line-height:1.15; }
.gig { background:#fff; border:2px solid #e9e9f0; border-radius:26px; margin-top:26px; overflow:hidden; box-shadow:0 8px 28px rgba(23,23,31,0.07); }
.gig .gtop { display:flex; align-items:center; gap:22px; padding:28px 34px; }
.gig .fv { font-family:'Inter7'; font-size:36px; color:#1DBF73; }
.gig .gb { padding:0 34px 30px; font-size:31px; color:#17171f; font-weight:600; line-height:1.45; }
.gig .gstars { padding:0 34px 30px; color:#f7a600; font-size:27px; }
.gig .gstars b { color:#17171f; margin-left:10px; }
.gig .gprice { margin-left:auto; font-family:'Archivo'; font-size:38px; color:#17171f; }
.row2 { background:#fff; border:2px solid #e9e9f0; border-radius:26px; padding:30px 34px; margin-top:22px; display:flex; align-items:center; gap:26px; box-shadow:0 6px 22px rgba(23,23,31,0.05); }
.row2 .ic3 { width:84px; height:84px; min-width:84px; border-radius:22px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Inter7'; font-size:38px; }
.row2 .t2 { font-size:32px; font-weight:700; color:#17171f; }
.row2 .s2 { font-size:26px; color:#77778c; margin-top:6px; }
.chipline { display:flex; justify-content:center; margin-top:40px; }
.chipp { background:#17171f; color:#fff; border-radius:44px; padding:22px 46px; font-family:'Inter7'; font-size:31px; }
.chipp span { color:#F0A13C; }
.gray-bg { background:#fafafa; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const ease = (p) => 1 - Math.pow(1 - Math.min(1, Math.max(0, p)), 3);
const io = (t, st, dur) => ease((t - st) / dur);
const el = (f, html, dy=26) => `<div style="opacity:${f.toFixed(3)};transform:translateY(${(dy*(1-f)).toFixed(1)}px)">${html}</div>`;
const tw = (s, t, a, b) => t < a ? '' : s.slice(0, Math.floor(s.length * Math.min(1, (t-a)/(b-a))));

function shell(inner) {
  return `<div class="page"><div class="urlbar"><div>reimaginehome.ai</div></div>
    <div class="hdr"><div class="wm">ReimagineHome</div><div class="bg3"><div></div><div></div><div></div></div></div>
    <div class="body">${inner}</div></div>`;
}
const PR = "Warm, modern living room";
function sceneS(t) {
  let html = '';
  if (t < 2.90) {                       /* homepage */
    const f = io(t, 0.45, 0.35);
    const pressed = t >= 2.45 && t < 2.75;
    html = shell(el(f, `<div class="serif-h">Create spaces you'll actually show, buy, or commit to.</div>
      <div class="sub">Design using real products available in your area and within your budget, without changing structural elements.</div>
      <div class="chips2"><div>Lock structure for listings</div><div>Design with real products</div><div>Recreate a Pinterest look</div><div>Turn moodboards to rooms</div></div>
      <div class="teal-btn"><div ${pressed?'style="transform:scale(0.96);background:#12876f"':''}>Start 5 free designs &rarr;</div></div>
      <div class="nocc">No credit card required. No limits. No trial countdown.</div>
      <div class="stats"><div><b>2.1M+</b><span>users</span></div><div><b>30M+</b><span>designs</span></div><div><b>7/10</b><span>outputs downloaded</span></div></div>`));
  } else if (t < 3.50) {                /* app: Start with any photo */
    const f = io(t, 2.90, 0.25);
    const pressed = t >= 3.15 && t < 3.45;
    html = `<div class="page"><div class="urlbar"><div>app.reimaginehome.ai</div></div>
      <div class="apphdr"><div class="wm">ReimagineHome</div><div class="rt"><div class="ic4"><svg viewBox="0 0 24 24"><path d="M12 3l2 4.5L19 8l-3.5 3 1 5-4.5-2.5L7.5 16l1-5L5 8l5-.5z"/></svg></div><div class="av">N</div></div></div>
      <div class="body">${el(f, `<div class="serif-h2">Start with any photo</div>
        <div class="sub2">A quick photo is enough &mdash; nothing here is final.</div>
        <div class="sub3">Works with empty or furnished rooms, exteriors, and listing photos.</div>
        <div class="dropz"><div class="cl"><svg viewBox="0 0 24 24"><path d="M7 17a4.5 4.5 0 0 1-.4-9A6 6 0 0 1 18 9.5a4 4 0 0 1-.5 7.96M12 12v7M9.5 14.5L12 12l2.5 2.5"/></svg></div>
          <div class="d1">Browse photos or drag and drop to upload.<br><b>(You can only upload 1 photo at a time.)</b></div>
          <div class="d2">Allowed formats: PNG, JPEG, JPG, WEBP, HEIC &amp; HEIF</div></div>
        <div class="upbtn" ${pressed?'style="transform:scale(0.97);background:#0d1230"':''}>Upload Photos</div>`)}</div></div>`;
  } else if (t < 8.50) {                /* app: Your Design Companion chat */
    const f = io(t, 3.50, 0.3);
    const photoIn = io(t, 3.60, 0.35);
    const typed = tw(PR, t, 4.45, 5.15);
    const sendPress = t >= 5.28 && t < 5.50;
    const sent = t >= 5.46;
    let flow = '';
    if (photoIn > 0) flow += `<div class="dc-photo" style="opacity:${photoIn.toFixed(3)}"><div class="pw"><img src="re_before.png"><div class="otag">ORIGINAL</div><div class="etag"></div></div></div>`;
    if (t >= 4.0) flow += el(io(t,4.0,0.3), `<div class="dc-msg">Help us tailor real, shippable products for your space. What should we change?</div>`, 18);
    if (sent) flow += el(io(t,5.46,0.25), `<div class="dc-bubble"><div class="in2">${PR}</div></div>`, 16);
    if (t >= 5.75 && t < 6.2) flow += el(io(t,5.75,0.2), `<div class="dc-msg" style="color:#8a8a94">Designing your space&#8230;</div>`, 12);
    if (t >= 6.2) {
      const rf = io(t, 6.2, 0.35);
      flow += `<div class="dc-msg" style="opacity:${rf.toFixed(3)};max-width:86%"><div style="border-radius:16px;overflow:hidden;margin-bottom:20px"><img src="re_after.png" style="width:100%;display:block"></div>
        Here&rsquo;s your warm, modern redesign${t>=7.45?' &mdash; <b>ready to send</b>':''}.
        ${t>=6.6?`<div class="stylechip" style="margin-top:22px"><div>Warm Modern &middot; real shoppable products</div></div>`:''}
        ${t>=7.45?`<div class="dlrow" style="margin-top:24px;justify-content:flex-start"><div class="dl">Download high-res</div></div>`:''}</div>`;
    }
    const composerTx = sent ? `<div class="ph2">Tell us what to change...</div>` : (typed ? `<div class="tx2">${typed}${typed.length<PR.length?'<span style="display:inline-block;width:3px;height:34px;background:#141a35;vertical-align:-6px"></span>':''}</div>` : `<div class="ph2">Tell us what to change...</div>`);
    html = `<div class="page"><div class="urlbar"><div>app.reimaginehome.ai</div></div>
      <div style="opacity:${f.toFixed(3)};position:relative;flex:1;display:flex;flex-direction:column">
      <div class="apphdr"><div class="wm">ReimagineHome</div><div class="rt"><div class="ic4"><svg viewBox="0 0 24 24"><path d="M7 15a4 4 0 0 1-.3-8A5.5 5.5 0 0 1 17.5 8.5 3.5 3.5 0 0 1 17 15M12 10v6M9.8 12.2L12 10l2.2 2.2"/></svg></div><div class="av">N</div></div></div>
      <div class="dc-top"><div class="dc-back">&larr;</div><div class="dc-t">Your Design Companion</div></div>
      <div class="dc-sub"><div class="dc-on"><i></i>Online</div><div class="freep"><div class="sp2">&#10022;</div><div><b>5/5 Free Designs</b><span>REMAINING</span></div></div></div>
      ${flow}
      <div class="composer" ${sendPress?'style="border-color:#0d6e5c"':''}>${composerTx}
        <div class="crow2"><div class="newp">+ New</div><div class="cnt">${sent?'0':Math.min(typed.length,500)}/500</div>
        <div class="send2" ${sendPress?'style="transform:scale(0.9);background:#17A78C"':''}><svg viewBox="0 0 24 24"><path d="M12 19V6M6.5 11.5L12 6l5.5 5.5"/></svg></div></div></div>
      <div class="dc-note">Design companion can make mistakes. Double check for accuracy.</div>
      </div></div>`;
  } else {                              /* offer + money (brand graphics) */
    const f = io(t, 8.50, 0.3);
    const gig = el(f, `<div class="hero-t">Where to sell it</div>
      <div class="gig"><div class="gtop"><div class="fv">fiverr.</div><div class="gprice">from $25</div></div>
        <div class="gb">I will redesign your room with AI in under an hour</div>
        <div class="gstars">&#9733;&#9733;&#9733;&#9733;&#9733;<b>5.0 (214)</b></div></div>`);
    let rows = '';
    if (t >= 9.9) rows += el(io(t,9.9,0.3), `<div class="row2"><div class="ic3" style="background:#1877F2">f</div><div><div class="t2">Facebook groups</div><div class="s2">Local home &amp; renovation communities</div></div></div>`, 20);
    if (t >= 10.85) rows += el(io(t,10.85,0.3), `<div class="row2"><div class="ic3" style="background:#17171f">RE</div><div><div class="t2">Real estate agents</div><div class="s2">Staged photos for their listings</div></div></div>`, 20);
    let chips = '';
    if (t >= 12.9) chips += el(io(t,12.9,0.3), `<div class="chipline" style="margin-top:52px"><div class="chipp">UNDER <span>1 MINUTE</span> PER ROOM</div></div>`, 16);
    if (t >= 13.6) chips += el(io(t,13.6,0.3), `<div class="chipline" style="margin-top:20px"><div class="chipp" style="font-size:36px;padding:26px 54px">AN EXTRA <span>$5K A MONTH</span></div></div>`, 16);
    html = `<div class="page gray-bg"><div class="urlbar"><div>reimaginehome.ai</div></div><div style="padding:60px 58px">${gig}${rows}${chips}</div></div>`;
  }
  stage.innerHTML = html;
}
window.seek = (scene, t) => { ({S: sceneS})[scene](t); return true; };
</script>
