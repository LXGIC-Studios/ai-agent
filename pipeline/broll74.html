<meta charset="utf-8">
<style>
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter7'; src:url('fonts/Inter-700.ttf'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#0d1117; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }
/* github chrome */
.gh { width:1080px; height:1920px; background:#0d1117; display:flex; flex-direction:column; }
.gh-top { height:120px; background:#010409; border-bottom:1px solid #21262d; display:flex; align-items:center; padding:0 40px; gap:26px; }
.gh-burger { width:60px; height:60px; border:1px solid #30363d; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; }
.gh-burger div { width:28px; height:2.5px; background:#e6edf3; border-radius:2px; }
.gh-cat { width:64px; height:64px; }
.gh-search { flex:1; height:64px; border:1px solid #30363d; border-radius:14px; display:flex; align-items:center; padding:0 24px; color:#7d8590; font-size:27px; }
.gh-av { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,#F0A13C,#d97757); }
.gh-body { flex:1; padding:44px 48px; overflow:hidden; }
.gh-crumb { display:flex; align-items:center; gap:16px; font-size:33px; color:#4493f8; }
.gh-crumb .sep { color:#7d8590; }
.gh-crumb b { color:#e6edf3; font-weight:600; }
.gh-pub { border:1px solid #30363d; color:#7d8590; border-radius:30px; font-size:23px; padding:6px 20px; margin-left:14px; }
.gh-desc { color:#7d8590; font-size:31px; line-height:1.5; margin-top:26px; max-width:900px; }
.gh-stats { display:flex; gap:20px; margin-top:34px; }
.gh-stat { border:1px solid #30363d; background:#161b22; border-radius:16px; padding:16px 30px; color:#e6edf3; font-size:28px; display:flex; align-items:center; gap:14px; }
.gh-stat b { color:#e6edf3; }
.gh-stat .ic { color:#e3b341; font-size:30px; }
.readme { border:1px solid #30363d; border-radius:20px; margin-top:44px; overflow:hidden; }
.readme-bar { background:#161b22; border-bottom:1px solid #30363d; padding:22px 32px; color:#e6edf3; font-size:29px; font-weight:600; }
.readme-body { padding:34px; }
.rm-h { color:#e6edf3; font-size:42px; font-weight:700; border-bottom:1px solid #30363d; padding-bottom:20px; }
.cat-row { display:flex; align-items:center; justify-content:space-between; padding:24px 20px; border-bottom:1px solid #21262d; border-radius:12px; }
.cat-row .nm { color:#4493f8; font-size:33px; }
.cat-row .ct { color:#7d8590; font-size:26px; }
.cat-row.hot { background:rgba(240,161,60,0.12); outline:2px solid rgba(240,161,60,0.75); }
.cat-row.hot .nm { color:#F0A13C; font-weight:600; }
.more-chip { display:flex; justify-content:center; margin-top:30px; }
.more-chip div { background:rgba(240,161,60,0.14); border:2px solid rgba(240,161,60,0.6); color:#F0A13C; border-radius:40px; padding:16px 40px; font-family:'Inter7'; font-size:30px; letter-spacing:1px; }
/* dashboard demo */
.demo { padding:60px 70px; height:100%; display:flex; flex-direction:column; justify-content:center; }
.api-chip { display:flex; justify-content:center; }
.api-chip .in { background:#161b22; border:2px solid #30363d; border-radius:24px; padding:28px 44px; display:flex; align-items:center; gap:24px; }
.api-chip .dot9 { width:22px; height:22px; border-radius:50%; }
.api-chip .t { color:#e6edf3; font-size:34px; font-weight:600; }
.api-chip .s { color:#7d8590; font-size:26px; }
.pipe { width:6px; margin:0 auto; background:linear-gradient(#F0A13C,rgba(240,161,60,0.15)); border-radius:3px; }
.dash { background:#161b22; border:2px solid #30363d; border-radius:28px; padding:44px; }
.dash-t { color:#e6edf3; font-size:36px; font-weight:700; display:flex; align-items:center; justify-content:space-between; }
.live { background:rgba(240,161,60,0.16); border:2px solid rgba(240,161,60,0.7); color:#F0A13C; font-family:'Inter7'; font-size:25px; border-radius:30px; padding:8px 24px; letter-spacing:2px; }
.kpis { display:flex; gap:24px; margin-top:36px; }
.kpi { flex:1; background:#0d1117; border:1px solid #30363d; border-radius:20px; padding:30px; }
.kpi .l { color:#7d8590; font-size:25px; }
.kpi .v { color:#e6edf3; font-family:'Archivo'; font-size:52px; margin-top:10px; }
.kpi .d { color:#3fb950; font-size:24px; margin-top:8px; }
.chart { display:flex; align-items:flex-end; gap:18px; height:250px; margin-top:40px; padding:0 8px; }
.chart div { flex:1; background:linear-gradient(180deg,#F0A13C,#c77f2a); border-radius:10px 10px 4px 4px; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const ease = (p) => 1 - Math.pow(1 - Math.min(1, Math.max(0, p)), 3);
const io = (t, st, dur) => ease((t - st) / dur);
const el = (f, html, dy=28) => `<div style="opacity:${f.toFixed(3)};transform:translateY(${(dy*(1-f)).toFixed(1)}px)">${html}</div>`;
const CATSVG = `<svg class="gh-cat" viewBox="0 0 16 16" fill="#e6edf3"><path d="M8 0c4.42 0 8 3.58 8 8a8.01 8.01 0 0 1-5.47 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>`;
const STAR = `<span class="ic">&#9733;</span>`;
const FORK = `<span style="color:#7d8590;font-size:30px">&#8916;</span>`;

const CATS = [
  ["Business", "63 APIs", 4.83],
  ["Finance", "58 APIs", 5.45],
  ["Food &amp; Drink", "31 APIs", 5.97],
  ["Games &amp; Comics", "72 APIs", 6.57],
  ["Email", "12 APIs", 7.13],
  ["Marketing", "18 APIs", 7.65]
];

function chrome(inner) {
  return `<div class="gh"><div class="gh-top"><div class="gh-burger"><div></div><div></div><div></div></div>${CATSVG}
    <div class="gh-search">Type <span style="border:1px solid #30363d;border-radius:8px;padding:2px 12px;margin:0 10px;font-size:23px">/</span> to search</div>
    <div class="gh-av"></div></div><div class="gh-body">${inner}</div></div>`;
}

function sceneS1(t) {
  if (t < 9.17) {
    const f0 = io(t, 0.05, 0.35);
    let inner = el(f0, `<div class="gh-crumb"><span>public-apis</span><span class="sep">/</span><b>public-apis</b><span class="gh-pub">Public</span></div>
      <div class="gh-desc">A collective list of free APIs for use in software and web development</div>
      <div class="gh-stats"><div class="gh-stat">${STAR}<b>350k</b> stars</div><div class="gh-stat">${FORK}<b>60k</b> forks</div></div>`);
    if (t >= 1.65) {
      let rows = '';
      CATS.forEach(([nm, ct, hot], i) => {
        const st = 3.23 + i * 0.14;
        if (t >= st) {
          const f = io(t, st, 0.25);
          const on = t >= hot && t < hot + 0.5;
          rows += `<div class="cat-row ${on?'hot':''}" style="opacity:${f.toFixed(3)}"><div class="nm">${nm}</div><div class="ct">${ct}</div></div>`;
        }
      });
      const more = t >= 8.01 ? el(io(t, 8.01, 0.3), `<div class="more-chip"><div>+ 40 MORE CATEGORIES</div></div>`, 16) : '';
      inner += el(io(t, 1.65, 0.3), `<div class="readme"><div class="readme-bar">README.md</div><div class="readme-body">
        <div class="rm-h">Index of Free APIs</div>${rows}</div></div>${more}`);
    }
    stage.innerHTML = chrome(inner);
  } else {
    const f0 = io(t, 9.17, 0.3);
    const conn = t >= 11.73;
    const connDone = t >= 12.5;
    // live numbers tick from 13.13
    const tick = t < 13.13 ? 0 : Math.min(1, (t - 13.13) / 2.6);
    const rev = Math.floor(84200 + 12480 * ease(tick));
    const ord = Math.floor(1240 + 212 * ease(tick));
    const up = (6.2 + 2.1 * ease(tick)).toFixed(1);
    const H = [0.35, 0.5, 0.42, 0.62, 0.55, 0.74, 0.68, 0.9];
    let bars = '';
    H.forEach((h, i) => {
      const g = t < 13.13 ? 0.35 : 0.35 + 0.65 * ease(Math.min(1, Math.max(0, (t - 13.2 - i * 0.12) / 0.5)));
      bars += `<div style="height:${(h * g * 100).toFixed(1)}%"></div>`;
    });
    const liveOn = t >= 15.21;
    const dashIn = io(t, 9.79, 0.35);
    stage.innerHTML = chrome(`<div class="demo">
      ${el(f0, `<div class="api-chip"><div class="in"><div class="dot9" style="background:${connDone?'#3fb950':'#7d8590'}"></div>
        <div><div class="t">Business API</div><div class="s">${connDone ? 'Connected &middot; streaming' : (conn ? 'Connecting&#8230;' : 'free &middot; no key required')}</div></div></div></div>`)}
      <div class="pipe" style="height:${conn ? (70 * io(t,11.73,0.4)).toFixed(0) : 0}px"></div>
      ${t >= 9.79 ? el(dashIn, `<div class="dash"><div class="dash-t">Business Dashboard ${liveOn ? `<span class="live" style="opacity:${io(t,15.21,0.25).toFixed(3)}">LIVE</span>` : ''}</div>
        <div class="kpis">
          <div class="kpi"><div class="l">Revenue</div><div class="v">$${rev.toLocaleString()}</div><div class="d">&#9650; ${up}%</div></div>
          <div class="kpi"><div class="l">Orders</div><div class="v">${ord.toLocaleString()}</div><div class="d">&#9650; live</div></div></div>
        <div class="chart">${bars}</div></div>`) : ''}
    </div>`);
  }
}
window.seek = (scene, t) => { ({S1: sceneS1})[scene](t); return true; };
</script>
