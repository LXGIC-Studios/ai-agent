<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
// intro raw = global + 0.55; VO raw = global - 3.67; outro raw = global - 20.35
const CHUNKS = [
 [0.11,1.45,"I recently built an |entire business plan|"],
 [1.45,2.75,"with |AI| in just |15 minutes|"],
 [2.83,3.66,"here's how to |get started|"],
 [3.72,5.79,"first open |ChatGPT|, |Claude|,"],
 [5.79,6.85,"or whatever |AI| you're using"],
 [6.85,8.01,"and |describe your business idea|"],
 [8.33,9.17,"ask it to create"],
 [9.17,10.53,"a |complete business plan|"],
 [10.53,11.33,"with an |executive summary|"],
 [11.45,12.15,"|market analysis|"],
 [12.49,13.29,"|competitive research|"],
 [13.51,14.11,"|revenue model|"],
 [14.41,15.07,"|marketing strategy|"],
 [15.41,16.29,"and a |12-month roadmap|"],
 [16.79,17.27,"|in seconds|"],
 [17.27,18.31,"it'll generate a |polished plan|"],
 [18.31,19.17,"that you can |copy|"],
 [19.17,20.43,"into any document and |customize|"],
 [20.89,22.75,"a great tool to create |any business plan|"],
 [22.75,24.01,"so you can start |pitching to investors|"],
 [24.51,25.75,"or just |getting your idea out there|"],
 [25.75,26.91,"I hope this video |helped you out|"],
 [26.91,28.10,"|follow along| for my |AI tips|"]
];
function fmt(txt){
  const parts=txt.split('|'); let out='';
  parts.forEach((seg,i)=>{ if(seg) out+= i%2?`<span class="org">${seg}</span>`:`<span>${seg}</span>`; });
  return out;
}
window.seek=(t)=>{
  const c=CHUNKS.find(([s,e])=>t>=s&&t<e);
  if(!c){ stage.innerHTML=''; return true; }
  const lt=t-c[0]; let s,o;
  if(lt<0.12){ const p=lt/0.12,e=1-Math.pow(1-p,3);
    s=0.78+0.28*e; if(p>0.7) s=1.06-(p-0.7)/0.3*0.06; o=Math.min(1,p*1.8);
  } else { s=1.0; o=1; }
  stage.innerHTML=`<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
