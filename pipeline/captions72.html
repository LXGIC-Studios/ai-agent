<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.10,0.82,"|China| just released"],
 [0.82,1.64,"an |open source AI|"],
 [1.64,2.91,"that's taking on |Claude|"],
 [2.81,4.63,"it's called |GLM 5.2|"],
 [4.63,5.65,"from |Z.ai|"],
 [5.65,7.39,"|744 billion| parameters"],
 [7.51,8.71,"an |MIT license|"],
 [8.77,10.57,"a |1 million token| context window"],
 [10.57,11.99,"built for |coding projects|"],
 [12.17,13.51,"according to |published benchmarks|"],
 [13.51,15.13,"it outperforms |GPT 5.2|"],
 [15.13,16.99,"on several |coding and reasoning| tests"],
 [17.41,19.13,"trained on |Huawei's AI chips|"],
 [19.13,20.63,"instead of |Nvidia's| hardware"],
 [20.63,21.53,"and the company says"],
 [21.53,22.29,"it's |significantly cheaper|"],
 [22.29,24.59,"than |GPT 5.2 and Claude| to run"],
 [25.17,26.49,"setup only takes |a couple minutes|"],
 [26.91,27.43,"comment |GUIDE|"],
 [27.53,28.81,"and I'll show you |how to install it|"],
 [29.04,30.68,"save a |bunch of money| on coding"],
 [30.68,31.82,"day-to-day tasks"],
 [31.82,33.58,"and keep up with a |very high output|"],
 [33.78,34.66,"hope this video helped you out"],
 [34.66,34.98,"and of course"],
 [35.00,36.12,"|follow along| for our AI tips"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
