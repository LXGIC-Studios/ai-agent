<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.10,0.92,"here's an |easy way|"],
 [0.92,1.60,"to make |five grand a month|"],
 [1.60,2.40,"using |AI|"],
 [2.40,3.50,"most |local businesses|"],
 [3.50,4.95,"don't have a |professional site|"],
 [5.20,6.32,"here's how to |take advantage|"],
 [6.54,7.95,"go to |Durable AI|"],
 [8.06,9.00,"click |start for free|"],
 [9.08,10.10,"enter the |business name|"],
 [10.12,11.40,"|location, services|"],
 [11.40,12.38,"and a |short description|"],
 [12.40,14.55,"created a website for a |dental clinic|"],
 [14.60,16.50,"Durable generated the |entire website|"],
 [16.55,17.65,"in just a |few minutes|"],
 [17.96,19.95,"spend 5 minutes |customizing it|"],
 [20.26,22.50,"find businesses with |outdated websites|"],
 [22.56,23.60,"or |no website at all|"],
 [23.64,24.95,"send them a |free sample|"],
 [25.00,27.30,"offer to |customize it| for them"],
 [27.84,29.85,"they'll pay |hundreds|"],
 [29.90,31.85,"or even |thousands of dollars|"],
 [32.26,33.85,"AI builds it |in minutes|"],
 [34.04,35.00,"hope you found this |helpful|"],
 [35.14,36.68,"making a whole |new series|"],
 [36.68,39.06,"|how to make money with AI|"],
 [39.20,40.45,"if you like these videos"],
 [40.46,41.25,"|follow along|"],
 [41.26,42.60,"comment |what to cover next|"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
