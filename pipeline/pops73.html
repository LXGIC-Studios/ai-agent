<meta charset="utf-8">
<style>
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; }
.row { position:absolute; left:0; width:1080px; display:flex; justify-content:center; gap:24px; }
.chip { background:rgba(11,11,13,0.72); border:1.5px solid rgba(255,255,255,0.22); border-radius:22px;
  padding:20px 36px; font-family:'Archivo'; font-weight:900; font-size:32px; color:#f4f2ee;
  letter-spacing:3px; text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55);
  box-shadow:0 12px 40px rgba(0,0,0,0.45); }
.chip .org { color:#F0A13C; }
.pill-wrap { position:absolute; left:0; width:1080px; display:flex; justify-content:center; }
.pill { background:rgba(11,11,13,0.72); border:1.5px solid rgba(255,255,255,0.22); border-radius:24px;
  padding:26px 48px; font-family:'Archivo'; font-weight:900; font-size:38px; color:#f4f2ee;
  letter-spacing:3.5px; text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55);
  box-shadow:0 12px 44px rgba(0,0,0,0.45); }
.pill .org { color:#F0A13C; }
.cta { background:rgba(58,56,58,0.92); border:none; }
.pw { position:relative; display:inline-block; }
.ring { position:absolute; inset:-4px; border:3px solid rgba(240,161,60,0.85); border-radius:26px; pointer-events:none; }
</style>
<div id="stage"></div>
<script>
// global out-timeline. wipe 3.52 / scenes / radial 21.55 / end 31.75
const INTRO = {txt:'Build a game in <span class="org">60 seconds</span>', tin:0.25, tout:3.51, y:96};
const GAME  = [ // over scene C, between score row and board
 {txt:'No <span class="org">coding</span>',        tin:19.42},
 {txt:'No <span class="org">IDE</span> needed',    tin:20.16},
];
const GAME_OUT = 21.53;
const OUT = [ // outro chips above his head
 {txt:'Steam',      tin:24.06},
 {txt:'App Store',  tin:24.72},
];
const OUT_OUT = 26.05;
const CTA = {txt:'Follow for <span class="org">more</span>', tin:29.58, y:96};
const stage=document.getElementById('stage');

function pop(lt,d=0.12){ if(lt<0) return null; if(lt>=d) return {s:1,o:1};
  const p=lt/d,e=1-Math.pow(1-p,3); let s=0.78+0.28*e;
  if(p>0.7) s=1.06-(p-0.7)/0.3*0.06; return {s,o:Math.min(1,p*1.8)}; }
function ringHtml(lt,r){ if(lt<0||lt>=0.38) return '';
  const p=lt/0.38,e=1-Math.pow(1-p,2);
  return `<div class="ring" style="border-radius:${r}px;transform:scale(${(1+0.38*e).toFixed(4)});opacity:${(0.85*(1-p)).toFixed(3)}"></div>`; }
function exitA(t,tout,d=0.15){ if(t<tout) return {s:1,o:1};
  const p=(t-tout)/d; if(p>=1) return null; return {s:1-0.06*p,o:1-p}; }

function chipRow(t, items, tout, y){
  let cells='', any=false;
  for(const c of items){
    const ps=pop(t-c.tin), ex=exitA(t,tout);
    if(!ps||!ex){ cells+=`<div class="pw" style="visibility:hidden"><div class="chip">${c.txt}</div></div>`; continue; }
    any=true;
    cells+=`<div class="pw" style="transform:scale(${(ps.s*ex.s).toFixed(4)});opacity:${(ps.o*ex.o).toFixed(3)}"><div class="chip">${c.txt}</div>${ringHtml(t-c.tin,22)}</div>`;
  }
  return any?`<div class="row" style="top:${y}px">${cells}</div>`:'';
}

window.seek=(t)=>{
  let html='';
  const ip=pop(t-INTRO.tin);
  if(ip && t<INTRO.tout)
    html+=`<div class="pill-wrap" style="top:${INTRO.y}px"><div class="pw" style="transform:scale(${ip.s.toFixed(4)});opacity:${ip.o.toFixed(3)}"><div class="pill">${INTRO.txt}</div>${ringHtml(t-INTRO.tin,24)}</div></div>`;
  html+=chipRow(t, GAME, GAME_OUT, 396);
  html+=chipRow(t, OUT, OUT_OUT, 120);
  const cp=pop(t-CTA.tin);
  if(cp)
    html+=`<div class="pill-wrap" style="top:${CTA.y}px"><div class="pw" style="transform:scale(${cp.s.toFixed(4)});opacity:${cp.o.toFixed(3)}"><div class="pill cta">${CTA.txt}</div>${ringHtml(t-CTA.tin,24)}</div></div>`;
  stage.innerHTML=html;
  return true;
};
</script>
