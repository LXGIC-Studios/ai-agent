<meta charset="utf-8">
<style>
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:#131215; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; padding:150px 56px 0;
  background:radial-gradient(ellipse 120% 60% at 50% -8%, #1e1c22 0%, #131215 60%); font-family:'Inter'; }
.top { display:flex; align-items:center; justify-content:space-between; padding-bottom:30px; }
.top .nm { font-family:'Archivo'; font-weight:900; font-size:44px; color:#f4f2ee; letter-spacing:2px; text-transform:uppercase; }
.top .sub { font-size:25px; color:#8a867d; margin-top:6px; }
.live { display:flex; align-items:center; gap:14px; background:rgba(74,222,128,0.10); border:1.5px solid rgba(74,222,128,0.45);
  border-radius:999px; padding:13px 26px; font-weight:600; font-size:25px; color:#4ade80; letter-spacing:2px; }
.dot { width:15px; height:15px; border-radius:50%; background:#4ade80; }
.kpis { display:flex; gap:22px; }
.kpi { flex:1; background:rgba(255,255,255,0.055); border:1.5px solid rgba(255,255,255,0.12); border-radius:24px; padding:26px 28px; }
.kpi .lab { font-size:23px; color:#8a867d; letter-spacing:1px; }
.kpi .val { font-family:'Archivo'; font-weight:900; font-size:48px; color:#f4f2ee; margin-top:8px; letter-spacing:1px; }
.kpi .d { font-size:22px; color:#4ade80; margin-top:6px; font-weight:600; }
.panel { margin-top:22px; background:rgba(255,255,255,0.055); border:1.5px solid rgba(255,255,255,0.12);
  border-radius:24px; padding:26px 28px 20px; }
.panel .lab { font-size:24px; color:#8a867d; letter-spacing:1px; margin-bottom:14px; }
.half { display:flex; gap:22px; margin-top:22px; }
.half .panel { flex:1; margin-top:0; }
.bar { display:flex; align-items:center; gap:16px; margin-bottom:14px; }
.bar .bn { font-size:23px; color:#eceae4; font-weight:600; width:170px; white-space:nowrap; overflow:hidden; }
.bar .bt { flex:1; height:26px; border-radius:8px; background:rgba(255,255,255,0.07); overflow:hidden; }
.bar .bf { height:100%; border-radius:8px; background:linear-gradient(90deg,#c97f2e,#F0A13C); }
.bar .bv { font-family:'Archivo'; font-weight:900; font-size:22px; color:#F0A13C; width:82px; text-align:right; }
.leg { font-size:22px; color:#8a867d; display:flex; flex-direction:column; gap:10px; }
.leg b { color:#eceae4; font-weight:600; }
.sw { display:inline-block; width:18px; height:18px; border-radius:5px; margin-right:10px; vertical-align:-2px; }
.goalrow { display:flex; align-items:center; gap:22px; }
.goalrow .gt { flex:1; height:30px; border-radius:9px; background:rgba(255,255,255,0.07); overflow:hidden; }
.goalrow .gf { height:100%; border-radius:9px; background:linear-gradient(90deg,#3f8f5a,#4ade80); }
.goalrow .gv { font-family:'Archivo'; font-weight:900; font-size:30px; color:#4ade80; width:110px; text-align:right; }
.frow { display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.055);
  border:1.5px solid rgba(255,255,255,0.12); border-radius:20px; padding:22px 28px; margin-top:18px; }
.frow .t { font-size:27px; color:#eceae4; font-weight:600; }
.frow .v { font-family:'Archivo'; font-weight:900; font-size:30px; color:#F0A13C; }
.frow .tm { font-size:22px; color:#8a867d; }
</style>
<div id="stage"></div>
<script>
function fmt(n){ return n.toLocaleString('en-US'); }
function ease(p){ return 1-Math.pow(1-Math.max(0,Math.min(1,p)),3); }
function popS(lt,d=0.14){ if(lt<0) return null; if(lt>=d) return {s:1,o:1};
  const p=lt/d,e=1-Math.pow(1-p,3); return {s:0.92+0.08*e,o:Math.min(1,p*1.7)}; }
const stage=document.getElementById('stage');

const BASE_PTS=[[0,150],[60,138],[120,144],[180,120],[240,126],[300,96],[360,104],[420,74],[480,84],[540,58],[600,66],[660,40],[720,50],[780,22]];
const LIVE_PTS=[[820,32],[856,14],[876,24]];         // extend as "live" points land
function chartSvg(t){
  const prog=ease(t/1.3);
  const W=880,H=168;
  let pts=BASE_PTS.filter(p=>p[0]<=prog*780);
  LIVE_PTS.forEach((p,i)=>{ if(t>4.6+0.8*i) pts=pts.concat([p]); });
  if(pts.length<2) return `<svg width="${W}" height="${H}"></svg>`;
  const line=pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
  const last=pts[pts.length-1];
  const area=line+` L${last[0]},${H} L0,${H} Z`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <path d="${area}" fill="rgba(240,161,60,0.14)"/>
    <path d="${line}" stroke="#F0A13C" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="9" fill="#F0A13C"/></svg>`;
}
function donutSvg(t){
  const p=ease((t-2.5)/1.2);
  const R=74, C=2*Math.PI*R;
  const segs=[[0.46,'#F0A13C'],[0.32,'#7aa2f7'],[0.22,'#4ade80']];
  let off=0, out='';
  for(const [frac,col] of segs){
    const len=C*frac*p;
    out+=`<circle r="${R}" cx="105" cy="105" fill="none" stroke="${col}" stroke-width="30"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 105 105)"/>`;
    off+=C*frac*p;
  }
  return `<svg width="210" height="210">${out}</svg>`;
}

window.seek=(t)=>{
  const rev=4832+Math.round(ease(t/7.6)*1284);
  const ord=118+Math.round(ease(t/7.6)*36);
  const vis=892+Math.round(ease(t/7.6)*263);
  const pulse=0.55+0.45*Math.abs(Math.sin(t*Math.PI*1.6));
  let html=`<div class="top"><div><div class="nm">Business dashboard</div><div class="sub">Coffee Co. &middot; today</div></div>
  <div class="live"><div class="dot" style="opacity:${pulse.toFixed(2)}"></div>LIVE</div></div>
  <div class="kpis">
    <div class="kpi"><div class="lab">Revenue</div><div class="val">$${fmt(rev)}</div><div class="d">+12.4% vs yesterday</div></div>
    <div class="kpi"><div class="lab">Orders</div><div class="val">${ord}</div><div class="d">+9 this hour</div></div>
    <div class="kpi"><div class="lab">Visitors</div><div class="val">${fmt(vis)}</div><div class="d">live on site</div></div>
  </div>
  <div class="panel"><div class="lab">Revenue &mdash; last 24h</div>${chartSvg(t)}</div>`;

  // half row: top products bars + traffic donut (enter 2.3)
  const hp=popS(t-2.3);
  if(hp){
    const bars=[["Latte bundle",0.92,"$1,890"],["Espresso kit",0.71,"$1,462"],["Beans 1kg",0.55,"$1,133"],["Gift cards",0.38,"$782"]];
    let bhtml='';
    bars.forEach((b,i)=>{
      const w=ease((t-2.5-0.18*i)/0.7)*b[1]*100;
      bhtml+=`<div class="bar"><span class="bn">${b[0]}</span><div class="bt"><div class="bf" style="width:${w.toFixed(1)}%"></div></div><span class="bv">${b[2]}</span></div>`;
    });
    html+=`<div class="half" style="opacity:${hp.o.toFixed(3)};transform:scale(${hp.s.toFixed(4)})">
      <div class="panel"><div class="lab">Top products</div>${bhtml}</div>
      <div class="panel" style="flex:0 0 340px"><div class="lab">Traffic</div>
        <div style="display:flex;align-items:center;gap:18px">${donutSvg(t)}
        <div class="leg"><span><span class="sw" style="background:#F0A13C"></span><b>46%</b> social</span>
        <span><span class="sw" style="background:#7aa2f7"></span><b>32%</b> search</span>
        <span><span class="sw" style="background:#4ade80"></span><b>22%</b> direct</span></div></div></div></div>`;
  }
  // goal bar (enter 4.0, fills to 100% by 6.9)
  const gp=popS(t-4.0);
  if(gp){
    const pct=62+Math.round(ease((t-4.1)/2.8)*38);
    html+=`<div class="panel" style="opacity:${gp.o.toFixed(3)};transform:scale(${gp.s.toFixed(4)})"><div class="lab">Monthly goal</div>
      <div class="goalrow"><div class="gt"><div class="gf" style="width:${pct}%"></div></div><div class="gv">${pct}%</div></div></div>`;
  }
  // live order feed: two slots, contents refresh with a pop
  const slots=[
    [["New order &mdash; latte bundle","$64.00",0.95],["New order &mdash; espresso kit","$89.00",5.5]],
    [["New order &mdash; subscription","$29.00",1.75],["New order &mdash; beans x2","$36.00",6.6]],
  ];
  for(const slot of slots){
    let cur=null;
    for(const o of slot){ if(t>=o[2]) cur=o; }
    if(!cur) continue;
    const ps=popS(t-cur[2],0.12);
    html+=`<div class="frow" style="transform:scale(${ps.s.toFixed(3)});opacity:${ps.o.toFixed(3)}"><span class="t">${cur[0]}</span><span class="v">${cur[1]}</span><span class="tm">just now</span></div>`;
  }
  stage.innerHTML=html;
  return true;
};
</script>
