<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.10,1.18,"|stop paying| for APIs"],
 [1.18,1.96,"you can get for |free|"],
 [2.10,3.33,"I found a |GitHub repository|"],
 [3.33,4.65,"with |hundreds of free APIs|"],
 [4.65,6.37,"all organized by |categories|"],
 [6.79,8.27,"|business, finance, food|"],
 [8.27,9.89,"|games, email, marketing|"],
 [9.89,10.86,"and many more"],
 [11.13,12.93,"building a |business dashboard|"],
 [13.41,14.71,"connect the |business API|"],
 [14.89,17.51,"to pull |live data| in real time"],
 [18.27,19.67,"one of the |most useful resources|"],
 [19.67,21.57,"for anybody |building an app|"],
 [21.57,23.19,"as well as |completely free|"],
 [23.57,24.31,"comment |GITHUB|"],
 [24.31,25.51,"and I'll send you the |link|"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
