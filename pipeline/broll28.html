<meta charset="utf-8">
<style>
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter7'; src:url('fonts/Inter-700.ttf'); }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#f6f6fa; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }
.app { width:1080px; height:1920px; background:#f6f6fa; display:flex; flex-direction:column; }
.top { height:118px; background:#fff; border-bottom:1px solid #e8e8f0; display:flex; align-items:center; padding:0 46px; }
.logo { font-family:'Inter7'; font-size:42px; color:#111; letter-spacing:-1px; }
.logo span { color:#635BFF; }
.nav { display:flex; gap:14px; margin-left:60px; }
.nav div { color:#84849a; font-size:27px; padding:14px 26px; border-radius:14px; }
.nav .on { background:#efedff; color:#635BFF; font-weight:600; }
.av { margin-left:auto; width:66px; height:66px; border-radius:50%; background:linear-gradient(135deg,#635BFF,#9b8cff); }
.body { flex:1; padding:52px 56px; }
.h1 { font-family:'Inter7'; font-size:52px; color:#16162c; }
.sub { color:#84849a; font-size:29px; margin-top:12px; }
.card { background:#fff; border:1px solid #e8e8f0; border-radius:26px; padding:38px 42px; margin-top:28px; box-shadow:0 6px 24px rgba(22,22,44,0.05); }
.row { display:flex; align-items:center; gap:30px; }
.sq { width:92px; height:92px; min-width:92px; border-radius:22px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Inter7'; font-size:38px; }
.nm { font-size:35px; color:#16162c; font-weight:600; }
.st { font-size:26px; color:#84849a; margin-top:6px; }
.btn { margin-left:auto; border-radius:40px; padding:18px 40px; font-size:28px; font-weight:700; }
.btn.c { background:#635BFF; color:#fff; }
.btn.ok { background:#e7f7ee; color:#1c9e5a; }
.chipline { display:flex; justify-content:center; margin-top:36px; }
.chipp { background:#16162c; color:#fff; border-radius:44px; padding:20px 44px; font-family:'Inter7'; font-size:30px; }
.chipp span { color:#F0A13C; }
.field { background:#f6f6fa; border:2px solid #e8e8f0; border-radius:20px; padding:28px 32px; font-size:31px; color:#16162c; margin-top:24px; min-height:96px; }
.dir { display:flex; gap:20px; margin-top:26px; }
.dir div { border:2px solid #e8e8f0; border-radius:40px; padding:18px 38px; font-size:29px; color:#84849a; font-weight:600; }
.dir .sel { background:#635BFF; border-color:#635BFF; color:#fff; }
.gen { background:#635BFF; color:#fff; border-radius:20px; text-align:center; padding:28px; font-size:32px; font-weight:700; margin-top:30px; }
.out { background:#fbfaff; border:2px solid #e4e0ff; border-radius:22px; padding:34px; margin-top:28px; }
.cap { font-size:31px; color:#16162c; line-height:1.55; }
.tags { color:#635BFF; font-size:28px; margin-top:18px; line-height:1.6; }
.tabs { display:flex; gap:16px; margin-top:26px; }
.tabs div { border:2px solid #e8e8f0; border-radius:16px; padding:16px 32px; font-size:28px; color:#84849a; font-weight:600; }
.tabs .sel { background:#efedff; border-color:#635BFF; color:#635BFF; }
.visual { border-radius:24px; margin-top:28px; height:560px; overflow:hidden; position:relative;
  background:linear-gradient(140deg,#2a1e52 0%,#635BFF 55%,#9b8cff 100%); display:flex; flex-direction:column; justify-content:flex-end; padding:48px; }
.visual .k { color:#fff; font-family:'Inter7'; font-size:64px; line-height:1.15; letter-spacing:-1px; }
.visual .s2 { color:rgba(255,255,255,0.8); font-size:31px; margin-top:16px; }
.visual .bean { position:absolute; border-radius:50%; background:rgba(255,255,255,0.12); }
.shimmer { border-radius:24px; margin-top:28px; height:560px; background:#eeeef4; display:flex; align-items:center; justify-content:center; color:#84849a; font-size:31px; }
.cal { display:flex; flex-wrap:wrap; margin-top:24px; }
.cal div { width:14.28%; text-align:center; padding:20px 0; font-size:28px; color:#3c3c50; border-radius:14px; }
.cal .dim { color:#c2c2d0; }
.cal .pick { background:#635BFF; color:#fff; font-weight:700; }
.trow { display:flex; gap:20px; margin-top:10px; }
.trow div { border:2px solid #e8e8f0; border-radius:16px; padding:16px 30px; font-size:28px; color:#84849a; }
.trow .sel { background:#efedff; border-color:#635BFF; color:#635BFF; font-weight:700; }
.conf { text-align:center; padding:30px 0 6px; }
.conf .big { font-family:'Inter7'; font-size:40px; color:#16162c; }
.conf .socials { display:flex; justify-content:center; gap:18px; margin-top:30px; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const ease = (p) => 1 - Math.pow(1 - Math.min(1, Math.max(0, p)), 3);
const io = (t, st, dur) => ease((t - st) / dur);
const el = (f, html, dy=26) => `<div style="opacity:${f.toFixed(3)};transform:translateY(${(dy*(1-f)).toFixed(1)}px)">${html}</div>`;
const tw = (s, t, a, b) => t < a ? '' : s.slice(0, Math.floor(s.length * Math.min(1, (t-a)/(b-a))));

const SOCIALS = [
  ["IG", "Instagram", "linear-gradient(45deg,#f09433,#e6683c,#dc2743,#bc1888)", 5.51],
  ["f", "Facebook", "#1877F2", 6.07],
  ["in", "LinkedIn", "#0A66C2", 6.59],
  ["X", "X", "#111", 7.07]
];
function chrome(tab, inner) {
  const tabs = ["Dashboard","Connections","AI Post","Studios","Schedule"].map(n =>
    `<div class="${n===tab?'on':''}">${n}</div>`).join('');
  return `<div class="app"><div class="top"><div class="logo">oc<span>o</span>ya</div><div class="nav">${tabs}</div><div class="av"></div></div>
    <div class="body">${inner}</div></div>`;
}
function sceneS(t) {
  let html = '';
  if (t < 8.45) {                                       /* A: Connections */
    const f0 = io(t, 0.15, 0.35);
    let rows = '';
    SOCIALS.forEach(([ic, nm, col, at], i) => {
      const rf = io(t, 3.2 + i * 0.16, 0.25);
      if (rf <= 0) return;
      const on = t >= at;
      rows += el(rf, `<div class="card"><div class="row"><div class="sq" style="background:${col}">${ic}</div>
        <div><div class="nm">${nm}</div><div class="st">${on ? 'Synced just now' : 'Not connected'}</div></div>
        <div class="btn ${on?'ok':'c'}" ${t>=at-0.22&&t<at?'style="transform:scale(0.95)"':''}>${on ? 'Connected' : 'Connect'}</div></div></div>`, 18);
    });
    const done = t >= 7.5 ? el(io(t,7.5,0.3), `<div class="chipline"><div class="chipp"><span>4 ACCOUNTS</span> CONNECTED</div></div>`, 16) : '';
    html = chrome("Connections", el(f0, `<div class="h1">Connections</div><div class="sub">Link your social accounts once — post everywhere</div>`) + rows + done);
  } else if (t < 17.85) {                               /* B: New AI Post */
    const f0 = io(t, 8.75, 0.3);
    const PROMPT = "Coffee shop launching a cold brew subscription";
    const typed = tw(PROMPT, t, 9.8, 11.0);
    const selLaunch = t >= 14.05;
    const pressed = t >= 15.2 && t < 15.45;
    let out = '';
    if (t >= 16.9) {
      out = el(io(t,16.9,0.3), `<div class="out"><div class="cap">Cold brew, delivered. Our new subscription drops this week &mdash; first month 20% off for early birds. Your fridge will thank you.</div>
        <div class="tags">#coldbrew #coffeesubscription #launchweek #coffeelover #dailybrew</div></div>`, 20);
    }
    html = chrome("AI Post", el(f0, `<div class="h1">New AI Post</div><div class="sub">Describe it &mdash; the AI writes your caption and hashtags</div>
      <div class="card"><div class="st">What do you want to post about?</div>
        <div class="field">${typed}${typed.length<PROMPT.length&&t>=9.8?'<span style="display:inline-block;width:3px;height:36px;background:#16162c;vertical-align:-6px"></span>':''}</div>
        <div class="dir"><div>Demo post</div><div class="${selLaunch?'sel':''}">Launch post</div><div>Tips post</div></div>
        <div class="gen" ${pressed?'style="transform:scale(0.97);background:#5148e0"':''}>Generate</div></div>`) + out);
  } else if (t < 25.5) {                                /* C: Studios */
    const f0 = io(t, 18.15, 0.3);
    const IPROMPT = "Moody cold brew bottle on ice, purple studio light";
    const typed = tw(IPROMPT, t, 21.2, 22.2);
    let vis = '';
    if (t >= 23.0) {
      const vf = io(t, 23.0, 0.4);
      const tag = t >= 23.6 ? `<div class="chipline" style="margin-top:26px"><div class="chipp" style="opacity:${io(t,23.6,0.3).toFixed(3)}">MATCHES YOUR <span>POST</span></div></div>` : '';
      vis = el(vf, `<div class="visual"><div class="bean" style="width:340px;height:340px;top:-90px;right:-70px"></div><div class="bean" style="width:180px;height:180px;top:130px;left:60px"></div>
        <div class="k">COLD BREW<br>CLUB</div><div class="s2">20% off launch week &middot; link in bio</div></div>`, 24) + tag;
    } else if (t >= 22.5) {
      vis = `<div class="shimmer">Generating visual&#8230;</div>`;
    }
    html = chrome("Studios", el(f0, `<div class="h1">Studios</div><div class="sub">Generate visuals sized for every platform</div>
      <div class="tabs"><div class="${t>=19.2?'sel':''}">Instagram</div><div>Facebook</div><div>LinkedIn</div><div>X</div></div>
      <div class="field">${typed}${typed.length<IPROMPT.length&&t>=21.2?'<span style="display:inline-block;width:3px;height:36px;background:#16162c;vertical-align:-6px"></span>':''}</div>`) + vis);
  } else {                                              /* D: Schedule */
    const f0 = io(t, 25.8, 0.3);
    const pickD = t >= 27.5, pickT = t >= 28.2, pressed = t >= 29.0 && t < 29.25, done = t >= 29.6;
    let days = '';
    for (let d = 1; d <= 14; d++) days += `<div class="${d===10&&pickD?'pick':(d<3?'dim':'')}">${d+6}</div>`;
    let inner;
    if (!done) {
      inner = `<div class="h1">Schedule</div><div class="sub">Pick when it goes live</div>
        <div class="card"><div class="st">July 2026</div><div class="cal">${days}</div>
        <div class="st" style="margin-top:26px">Time</div>
        <div class="trow"><div>8:00 AM</div><div class="${pickT?'sel':''}">9:00 AM</div><div>6:30 PM</div></div>
        <div class="gen" ${pressed?'style="transform:scale(0.97);background:#5148e0"':''}>Schedule post</div></div>`;
    } else {
      const cf = io(t, 29.6, 0.35);
      let socs = '';
      SOCIALS.forEach(([ic,, col], i) => {
        const sf = io(t, 29.9 + i * 0.22, 0.25);
        if (sf > 0) socs += `<div class="sq" style="background:${col};opacity:${sf.toFixed(3)};transform:scale(${(0.8+0.2*sf).toFixed(3)})">${ic}</div>`;
      });
      inner = `<div class="h1">Schedule</div><div class="sub">&nbsp;</div>
        <div class="card"><div class="conf">
          <div class="sq" style="background:#e7f7ee;color:#1c9e5a;margin:0 auto 30px;font-size:52px">&#10003;</div>
          <div class="big" style="opacity:${cf.toFixed(3)}">Scheduled &mdash; Fri, Jul 10 &middot; 9:00 AM</div>
          <div class="sub" style="margin-top:14px">Posting automatically to all connected accounts</div>
          <div class="socials">${socs}</div></div></div>
        ${t>=31.0?el(io(t,31.0,0.25),`<div class="chipline"><div class="chipp">POSTS <span>WHILE YOU SLEEP</span></div></div>`,14):''}`;
    }
    html = chrome("Schedule", el(f0, inner));
  }
  stage.innerHTML = html;
}
window.seek = (scene, t) => { ({S: sceneS})[scene](t); return true; };
</script>
