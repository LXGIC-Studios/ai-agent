<meta charset="utf-8">
<style>
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter7'; src:url('fonts/Inter-700.ttf'); }
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#fff; font-family:'Inter',-apple-system,sans-serif; }
#stage { width:1080px; height:1920px; position:relative; }
.page { width:1080px; height:1920px; background:#fff; display:flex; flex-direction:column; }
.urlbar { height:104px; background:#f4f4f6; border-bottom:1px solid #e8e8ec; display:flex; align-items:center; justify-content:center; }
.urlbar div { background:#e6e6ea; border-radius:28px; padding:16px 60px; font-size:29px; color:#3a3a3e; font-weight:600; }
.qwrap { flex:1; padding:0 56px; position:relative; }
.qx { position:absolute; top:70px; right:56px; font-size:52px; color:#333; font-weight:300; }
.qback { position:absolute; top:290px; left:56px; font-size:52px; color:#333; }
.icons { display:flex; justify-content:center; gap:44px; margin-top:310px; }
.icons svg { width:56px; height:56px; fill:none; stroke-width:2; }
.qh { font-size:52px; font-weight:700; color:#111; margin-top:56px; letter-spacing:-0.5px; line-height:1.25; }
.qfield { background:#f4f4f6; border:1.5px solid #e2e2e8; border-radius:32px; padding:38px 42px; font-size:36px; color:#111; margin-top:52px; min-height:130px; line-height:1.45; }
.qfield .ph { color:#a2a2ac; }
.qfield.tall { min-height:340px; }
.sugg { display:flex; gap:56px; margin-top:40px; justify-content:center; }
.sugg div { color:#555; font-size:30px; font-weight:600; }
.sugg span { color:#888; margin-right:10px; }
.opt { background:#f4f4f6; border-radius:32px; padding:34px; text-align:center; font-size:34px; color:#222; margin-top:24px; }
.opt.on { background:#6f9b80; color:#fff; font-weight:600; }
.langpill { display:flex; justify-content:center; margin-top:34px; }
.langpill div { border:1.5px solid #d8d8de; border-radius:36px; padding:16px 40px; color:#555; font-size:29px; }
.madlib { font-size:39px; color:#8a8a94; line-height:1.6; margin-top:44px; }
.madlib b { color:#111; border-bottom:2.5px dotted #b9b9c2; font-weight:700; }
.qbar { display:flex; gap:14px; margin-top:44px; }
.qbar div { flex:1; height:14px; border-radius:8px; background:#eeeef1; }
.qbar .on { background:#f6c344; }
.qnote { color:#8a8a94; font-size:29px; margin-top:22px; }
.nextwrap { padding:0 56px 30px; }
.nextbtn { background:#f0f0f3; border-radius:40px; text-align:center; padding:36px; font-size:36px; color:#555; }
.nextbtn.hot { background:#ededf0; color:#333; }
.dots { display:flex; justify-content:center; gap:16px; padding:26px 0 60px; }
.dots i { width:16px; height:16px; border-radius:8px; background:#e3e3e8; }
.dots i.on { width:56px; background:#9a9aa2; }
/* checklist screens */
.ck { padding:0 56px; }
.ckh { display:flex; align-items:center; gap:26px; font-size:42px; font-weight:700; color:#111; margin-top:70px; }
.ckh .chk { color:#333; font-size:44px; }
.feat { background:#f4f4f6; border-radius:32px; padding:26px 30px; margin-top:22px; display:flex; align-items:center; gap:28px; }
.feat .fic { width:96px; height:96px; min-width:96px; background:#fff; border-radius:24px; display:flex; align-items:center; justify-content:center; }
.feat .fic svg { width:44px; height:44px; stroke:#333; fill:none; stroke-width:1.8; }
.feat .ft { font-size:34px; font-weight:700; color:#111; }
.feat .fs { font-size:27px; color:#77777f; margin-top:6px; }
.asm { display:flex; align-items:center; gap:24px; margin-top:64px; color:#8a8a94; font-size:36px; }
.asm .sp { width:20px; }
.agent { display:flex; align-items:center; gap:30px; margin-top:36px; padding:0 10px; }
.orb { width:92px; height:92px; min-width:92px; border-radius:50%; }
.agent .at { font-size:35px; font-weight:700; color:#111; }
.agent .as { font-size:27px; color:#77777f; margin-top:4px; }
.skel { width:380px; height:36px; border-radius:20px; background:#efeff2; }
/* generated site (editor) */
.edbar { height:110px; background:#fff; border-bottom:1px solid #e8e8ec; display:flex; align-items:center; padding:0 44px; gap:26px; }
.edbar .bg3 div { width:34px; height:3px; background:#333; border-radius:2px; margin:7px 0; }
.edbar .pgpill { background:#f0f0f3; border-radius:30px; padding:16px 32px; font-size:28px; color:#333; font-weight:600; }
.edbar .sl { margin-left:auto; }
.edbar .sl svg { width:40px; height:40px; stroke:#333; fill:none; stroke-width:2; }
.edbar .play { background:#f0f0f3; border-radius:32px; width:120px; height:60px; display:flex; align-items:center; padding:0 10px; }
.edbar .play .pk { width:44px; height:44px; border-radius:50%; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.18); display:flex; align-items:center; justify-content:center; font-size:20px; color:#333; }
.edbar .rocket { width:76px; height:76px; border-radius:50%; background:#6C5CE7; display:flex; align-items:center; justify-content:center; }
.edbar .rocket svg { width:36px; height:36px; stroke:#fff; fill:none; stroke-width:2; }
.site { flex:1; background:#eceae7; position:relative; overflow:hidden; }
.arcs { position:absolute; inset:0; }
.sitehead { display:flex; align-items:center; padding:44px 48px 0; position:relative; }
.sitehead .bg3 div { width:38px; height:3.5px; background:#222; border-radius:2px; margin:8px 0; }
.sitehead .nm { font-family:Georgia,serif; font-weight:700; font-size:44px; color:#161616; line-height:1.15; margin-left:34px; padding-left:30px; border-left:2px solid #c9c7c2; }
.callpill { margin-left:auto; border-radius:44px; padding:26px 44px; font-size:29px; font-weight:700; color:#0c2b28; }
.thumb { position:absolute; width:160px; height:190px; border-radius:36px; border:11px solid #2b2b2b; overflow:hidden; }
.serifh { font-family:Georgia,serif; text-align:center; font-size:96px; color:#161616; line-height:1.12; letter-spacing:-1px; }
.sitesub { text-align:center; font-size:33px; color:#333; line-height:1.55; margin:34px auto 0; max-width:820px; }
.sitecta { display:flex; justify-content:center; margin-top:52px; }
.sitecta div { border-radius:48px; padding:32px 60px; font-size:31px; font-weight:700; color:#0c2b28; }
/* customize popover */
.pop { position:absolute; top:120px; right:40px; background:#fff; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.22); padding:30px 34px; }
.pop .pt { font-size:26px; color:#77777f; font-weight:600; }
.pop .sw { display:flex; gap:18px; margin-top:18px; }
.pop .sw div { width:54px; height:54px; border-radius:50%; border:3px solid transparent; }
.pop .sw .on { border-color:#111; }
/* outreach + payoff (brand graphics) */
.hero-t { font-family:'Archivo'; font-size:54px; color:#17171f; line-height:1.15; }
.card { background:#fff; border:1px solid #e9e9f0; border-radius:26px; padding:34px 40px; margin-top:26px; box-shadow:0 6px 24px rgba(23,23,31,0.06); }
.biz { display:flex; align-items:center; gap:26px; padding:26px 0; border-bottom:1px solid #efeff5; }
.biz .av2 { width:80px; height:80px; min-width:80px; border-radius:20px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:'Inter7'; font-size:32px; }
.biz .n { font-size:31px; font-weight:600; color:#17171f; }
.biz .tag { margin-left:auto; border-radius:30px; padding:12px 26px; font-size:24px; font-weight:700; }
.tag.bad { background:#fdeeee; color:#c0392b; }
.tag.none { background:#f2f2f7; color:#77778c; }
.msg { background:#eef4f3; border:2px solid #bcd9d4; border-radius:24px 24px 24px 6px; padding:30px 34px; font-size:29px; color:#17171f; line-height:1.5; margin-top:26px; max-width:800px; }
.msg .link { color:#0c7a6e; font-weight:700; }
.reply { background:#fff; border:2px solid #e9e9f0; border-radius:24px 24px 6px 24px; padding:30px 34px; font-size:29px; color:#17171f; margin-top:24px; max-width:640px; margin-left:auto; }
.sendb { display:flex; justify-content:flex-end; margin-top:18px; }
.sendb div { background:#111; color:#fff; border-radius:30px; padding:14px 40px; font-size:26px; font-weight:700; }
.pay-t { text-align:center; font-family:'Archivo'; font-size:52px; color:#17171f; margin-top:30px; }
.prices { display:flex; gap:22px; justify-content:center; margin-top:46px; }
.price { background:#fff; border:2px solid #e9e9f0; border-radius:24px; padding:40px 34px; text-align:center; width:280px; }
.price .amt { font-family:'Archivo'; font-size:58px; color:#17171f; }
.price .per { color:#77778c; font-size:24px; margin-top:10px; }
.price.hot { border-color:#0c7a6e; background:#eef4f3; }
.price.hot .amt { color:#0c7a6e; }
.chipline { display:flex; justify-content:center; margin-top:44px; }
.chipp { background:#17171f; color:#fff; border-radius:44px; padding:20px 44px; font-family:'Inter7'; font-size:30px; }
.chipp span { color:#F0A13C; }
.gray-bg { background:#fafafa; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const ease = (p) => 1 - Math.pow(1 - Math.min(1, Math.max(0, p)), 3);
const io = (t, st, dur) => ease((t - st) / dur);
const el = (f, html, dy=26) => `<div style="opacity:${f.toFixed(3)};transform:translateY(${(dy*(1-f)).toFixed(1)}px)">${html}</div>`;
const tw = (s, t, a, b) => t < a ? '' : s.slice(0, Math.floor(s.length * Math.min(1, (t-a)/(b-a))));
const car = (s, full, t, a) => `${s}${s.length<full.length&&t>=a?'<span style="display:inline-block;width:3px;height:38px;background:#111;vertical-align:-7px"></span>':''}`;

/* icon trios per step (line icons, per-step accent color) */
const I = {
  bulb: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.6 1 1.5 1 2.5h6c0-1 .3-1.9 1-2.5A6 6 0 0 0 12 3z"/></svg>`,
  case: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="3.5" y="7.5" width="17" height="12" rx="2"/><path d="M9 7.5V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.5M3.5 12h17"/></svg>`,
  person: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><circle cx="10" cy="7" r="3"/><path d="M5 20c0-3 2.2-5 5-5M14 20l6-6M14 14h6v6"/></svg>`,
  idc: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="3" y="5.5" width="18" height="13" rx="2"/><circle cx="8.5" cy="11" r="1.8"/><path d="M13 9.5h5M13 13h5M6 16h6"/></svg>`,
  stamp: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M12 3c1.7 0 3 1.3 3 3 0 1.4-1 2.4-1.5 4h-3C10 8.4 9 7.4 9 6c0-1.7 1.3-3 3-3zM7 14h10a2 2 0 0 1 2 2v2H5v-2a2 2 0 0 1 2-2zM5 21h14"/></svg>`,
  tsprk: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M5 6h10M10 6v12M17 4l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></svg>`,
  pin: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M12 21s-6.5-5.5-6.5-10.5a6.5 6.5 0 0 1 13 0C18.5 15.5 12 21 12 21z"/><circle cx="12" cy="10.5" r="2.4"/></svg>`,
  globe: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><circle cx="12" cy="12" r="8.5"/><path d="M3.5 12h17M12 3.5c2.5 2.5 3.5 5.3 3.5 8.5s-1 6-3.5 8.5c-2.5-2.5-3.5-5.3-3.5-8.5s1-6 3.5-8.5z"/></svg>`,
  flag: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M6 21V4M6 5c2-1.4 4-1.4 6 0s4 1.4 6 0v9c-2 1.4-4 1.4-6 0s-4-1.4-6 0"/></svg>`,
  money: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5v9M14.5 9.2c-.6-.8-1.5-1.2-2.5-1.2-1.4 0-2.5.8-2.5 2s1 1.7 2.5 2 2.5.8 2.5 2-1.1 2-2.5 2c-1 0-1.9-.4-2.5-1.2"/></svg>`,
  bag: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M9 7c-3 2-4.5 4.5-4.5 8 0 3.5 3 5.5 7.5 5.5s7.5-2 7.5-5.5c0-3.5-1.5-6-4.5-8M9 7l-1.5-2.5h9L15 7M9 7h6"/></svg>`,
  wallet: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="3.5" y="6" width="17" height="13" rx="2.5"/><path d="M16 12.5h4.5M16.8 12.5a1.2 1.2 0 1 0 0 .01"/></svg>`,
  tools: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M8 3v5M8 12v9M8 8a2.5 2.5 0 0 0 0 4M16 3v9M16 16v5M16 12a2.5 2.5 0 0 1 0 4"/></svg>`,
  person2: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><circle cx="12" cy="6.5" r="2.5"/><path d="M12 9v6M7 21l5-6 5 6M9 12.5h6"/></svg>`,
  rocket: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M12 15c-1-4 .5-8.5 6-11.5.5 6-1 10-5 12.5M12 15l-3-3M12 15l1.5 3.5M6.5 14c-1.5.5-2.5 2-3 4.5 2.5-.5 4-1.5 4.5-3"/><circle cx="14.5" cy="8.5" r="1.2"/></svg>`,
  layout: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10h16M10 10v9"/></svg>`,
  doc: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M7 3.5h7l4 4v13H7z"/><path d="M13.5 14.5l4-4M15.5 16.5l3-3"/></svg>`,
  img: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="4" y="5" width="16" height="14" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M4.5 17l5-5 4 4 2.5-2.5 3.5 3.5M17 4l.6 1.5L19 6l-1.4.6L17 8l-.6-1.4L15 6l1.4-.5z"/></svg>`,
  comp: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><circle cx="12" cy="12" r="8.5"/><path d="M15 9l-2 5-4 2 2-5z"/></svg>`,
  list: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M9 9h6M9 12.5h6M9 16h4"/></svg>`,
  cal: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><rect x="4" y="6" width="16" height="14" rx="2"/><path d="M4 10.5h16M9 4v4M15 4v4"/></svg>`,
  slid: c=>`<svg viewBox="0 0 24 24" stroke="${c}"><path d="M4 8h10M18 8h2M4 16h4M12 16h8"/><circle cx="16" cy="8" r="2.2"/><circle cx="10" cy="16" r="2.2"/></svg>`
};
const trio = (a,b,c2,col) => `<div class="icons">${I[a](col)}${I[b](col)}${I[c2](col)}</div>`;

function quiz(t, inner, dotIdx, btnTxt, btnHot, showBack) {
  let dots = '';
  for (let i = 0; i < 6; i++) dots += `<i class="${i===dotIdx?'on':''}"></i>`;
  return `<div class="page"><div class="urlbar"><div>durable.com</div></div>
    <div class="qwrap"><div class="qx">&times;</div>${showBack?'<div class="qback">&lsaquo;</div>':''}${inner}</div>
    <div class="nextwrap"><div class="nextbtn ${btnHot?'hot':''}">${btnTxt}</div></div>
    <div class="dots">${dots}</div></div>`;
}

const DESC = "Family dental clinic focused on gentle, modern care";
function sceneS(t) {
  let html = '';
  if (t < 3.0) {                       /* step 1: business type (coral) */
    const f = io(t, 0.45, 0.35);
    const typed = tw(DESC, t, 1.0, 2.4);
    const field = typed ? car(typed, DESC, t, 1.0) : `<span class="ph">Residential Cleaning, General Contracting, AI Consulting&#8230;</span>`;
    html = quiz(t, el(f, `${trio('bulb','case','person','#F05A3C')}
      <div class="qh">What type of business are you building?</div>
      <div class="qfield">${field}</div>`), 0, 'Next', typed.length > 10, false);
  } else if (t < 4.05) {               /* step: business name (blue) */
    const f = io(t, 3.0, 0.25);
    const nm = tw("Bright smile Dental", t, 3.1, 3.66);
    html = quiz(t, el(f, `${trio('idc','stamp','tsprk','#3B6FF0')}
      <div class="qh">What is the name of your business?</div>
      <div class="qfield">${nm ? car(nm, "Bright smile Dental", t, 3.1) : '<span class="ph">&nbsp;</span>'}</div>
      ${t>=3.72?`<div class="sugg" style="opacity:${io(t,3.72,0.2).toFixed(2)}"><div><span>&#10022;</span>More like this</div><div><span>&#10022;</span>See more suggestions</div></div>`:''}`), 3, 'Next', t>=3.7, true);
  } else if (t < 5.2) {                /* step: location (purple) */
    const f = io(t, 4.05, 0.25);
    const loc = t >= 4.2 ? 'United States' : '';
    html = quiz(t, el(f, `${trio('pin','globe','flag','#6C5CE7')}
      <div class="qh">Where is your business located?</div>
      <div class="qfield">${loc || '<span class="ph">Country</span>'}</div>
      ${t>=4.55?`<div class="langpill" style="opacity:${io(t,4.55,0.25).toFixed(2)}"><div>Website language: English</div></div>`:''}`), 2, 'Next', t>=4.2, true);
  } else if (t < 6.98) {               /* step: share more details (orange) */
    const f = io(t, 5.2, 0.25);
    const d2 = tw("focused on gentle, modern care", t, 5.5, 6.1);
    const barOn = t >= 6.2;
    const pressed = t >= 6.75 && t < 6.98;
    html = quiz(t, el(f, `${trio('bulb','tsprk','flag','#F0A13C')}
      <div class="qh">Share more details</div>
      <div class="madlib">You're building <b>Bright smile Dental</b>, a <b>dental clinic</b> business in <b>United States</b>, and you're just getting started.</div>
      <div class="qfield tall">${d2 ? car(d2, "focused on gentle, modern care", t, 5.5) : '<span class="ph">&nbsp;</span>'}</div>
      <div class="qbar"><div class="${barOn?'on':''}"></div><div></div><div></div><div></div></div>
      <div class="qnote">Add more details to generate better results</div>`), 4, pressed ? 'Start building' : 'Start building', t>=6.1, true);
    if (pressed) html = html.replace('nextbtn hot', 'nextbtn hot" style="transform:scale(0.98)');
  } else if (t < 11.05) {              /* foundation checklist -> agents */
    const FEATS = [
      ['layout','AI Website Builder','Professional, SEO-ready website'],
      ['doc','AI Blog Builder','Posts to bring you visitors'],
      ['img','Studio','On-brand marketing images'],
      ['comp','Discoverability','Rank higher in AI search'],
      ['list','CRM','Keep every customer in one place'],
      ['cal','Bookings','Get booked online']
    ];
    let rows = '';
    FEATS.forEach(([ic, tt, ss], i) => {
      const rf = io(t, 7.25 + i * 0.2, 0.25);
      if (rf > 0) rows += `<div class="feat" style="opacity:${rf.toFixed(3)};transform:translateY(${(16*(1-rf)).toFixed(1)}px)"><div class="fic">${I[ic]('#333')}</div><div><div class="ft">${tt}</div><div class="fs">${ss}</div></div></div>`;
    });
    let asm = '';
    if (t >= 8.8 && t < 9.75) {
      const spin = (t * 400).toFixed(0);
      asm = `<div class="asm"><span style="display:inline-block;width:36px;height:36px;border:4px solid #e3e3e8;border-top-color:#9a9aa2;border-radius:50%;transform:rotate(${spin}deg)"></span>
        <span>&#10022; Assembling your team of AI agents</span></div><div class="skel" style="margin-top:26px"></div>`;
    } else if (t >= 9.75) {
      const AG = [
        ['radial-gradient(circle at 30% 30%,#c86dd7,#7f53ac)','AI Partner','General-purpose AI assistant'],
        ['radial-gradient(circle at 30% 30%,#ff9a5a,#d7263d)','Blog','Blog content assistant'],
        ['radial-gradient(circle at 30% 30%,#8e2d8e,#4a1042)','Website Leads','Website lead response assistant'],
        ['radial-gradient(circle at 30% 30%,#e9e34f,#2e8b57)','Google Reviews','Monitor reviews and draft replies']
      ];
      let ags = '';
      AG.forEach(([g, tt, ss], i) => {
        const af = io(t, 9.9 + i * 0.22, 0.25);
        if (af > 0) ags += `<div class="agent" style="opacity:${af.toFixed(3)}"><div class="orb" style="background:${g}"></div><div><div class="at">${tt}</div><div class="as">${ss}</div></div></div>`;
      });
      asm = `<div class="ckh" style="margin-top:56px;font-size:38px"><span class="chk">&#10003;</span>Assembled your team of AI agents</div>${ags}`;
    }
    html = `<div class="page"><div class="urlbar"><div>durable.com</div></div><div class="ck">
      ${el(io(t,7.05,0.3), `<div style="margin-top:40px">${trio('tools','person2','rocket','#6C5CE7')}</div>
      <div class="ckh"><span class="chk">&#10003;</span>Built your business foundation</div>`)}${rows}${asm}</div></div>`;
  } else if (t < 14.3) {               /* generated website in editor */
    const f = io(t, 11.05, 0.3);
    const teal = t < 12.9 ? '#7de8dc' : '#cdb4f6';
    const headIn = io(t, 11.2, 0.3), thIn = io(t, 11.45, 0.3), hIn = io(t, 11.7, 0.35), sIn = io(t, 11.95, 0.3), cIn = io(t, 12.1, 0.3);
    const slidPress = t >= 12.2 && t < 12.45;
    let pop = '';
    if (t >= 12.45 && t < 13.7) {
      pop = `<div class="pop" style="opacity:${io(t,12.45,0.2).toFixed(2)}"><div class="pt">Theme</div>
        <div class="sw"><div class="${t<12.9?'on':''}" style="background:#7de8dc"></div><div class="${t>=12.9?'on':''}" style="background:#cdb4f6"></div><div style="background:#f6c344"></div></div></div>`;
    }
    const arcs = `<svg class="arcs" viewBox="0 0 1080 1600"><g fill="none" stroke="#dddbd6" stroke-width="2">
      <circle cx="540" cy="-500" r="700"/><circle cx="540" cy="-500" r="950"/><circle cx="540" cy="-500" r="1200"/><circle cx="540" cy="-500" r="1450"/></g></svg>`;
    html = `<div class="page" style="opacity:${f.toFixed(3)}">
      <div class="edbar"><div class="bg3"><div></div><div></div><div></div></div>
        <div class="pgpill">Page: Home &#8645;</div>
        <div class="sl" ${slidPress?'style="transform:scale(0.88)"':''}>${I.slid('#333')}</div>
        <div class="play"><div class="pk">&#9654;</div></div>
        <div class="rocket">${I.rocket('#fff')}</div></div>
      <div class="site">${arcs}${pop}
        <div class="sitehead" style="opacity:${headIn.toFixed(3)}"><div class="bg3"><div></div><div></div><div></div></div>
          <div class="nm">Bright smile<br>Dental</div><div class="callpill" style="background:${teal}">Call (123) 456-7890</div></div>
        <div class="thumb" style="top:560px;left:40px;opacity:${thIn.toFixed(3)}"><div style="width:100%;height:100%;background:linear-gradient(160deg,#bfd8e8 0%,#8fb4cc 50%,#e8e2d5 100%)"></div></div>
        <div class="thumb" style="top:580px;right:40px;opacity:${thIn.toFixed(3)}"><div style="width:100%;height:100%;background:linear-gradient(160deg,#e8dcc8 0%,#d4bfa0 60%,#f4ece0 100%)"></div></div>
        <div style="margin-top:900px;padding:0 60px;opacity:${hIn.toFixed(3)};transform:translateY(${(26*(1-hIn)).toFixed(1)}px)">
          <div class="serifh">A warm chair, a gentle touch</div></div>
        <div style="opacity:${sIn.toFixed(3)}"><div class="sitesub">Bright smile Dental makes every visit comfortable for the whole family. Modern care, no rushing.</div></div>
        <div class="sitecta" style="opacity:${cIn.toFixed(3)}"><div style="background:${teal}">Call to schedule</div></div>
      </div></div>`;
  } else if (t < 22.8) {               /* outreach (brand section) */
    const f = io(t, 14.3, 0.3);
    const BIZ = [["S","Smith Family Dental","#e8590c","Outdated site","bad"],["L","Lakeside Dental","#0c7a6e","No website","none"],["O","Oak Hill Dental","#6C5CE7","No website","none"]];
    let rows = '';
    BIZ.forEach(([ic,nm,col,tag,cls], i) => {
      const rf = io(t, 14.5 + i * 0.4, 0.25);
      if (rf > 0) rows += `<div class="biz" style="opacity:${rf.toFixed(3)}"><div class="av2" style="background:${col}">${ic}</div><div class="n">${nm}</div><div class="tag ${cls}">${tag}</div></div>`;
    });
    let msg = '';
    if (t >= 17.5) {
      const sent = t >= 18.2;
      msg = el(io(t,17.5,0.3), `<div class="msg">Hi! I built a free sample website for your clinic &mdash; take a look: <span class="link">brightsmiledental.durable.co</span>. Want me to customize it for you?</div>
        <div class="sendb"><div ${t>=18.0&&t<18.25?'style="transform:scale(0.94)"':''}>${sent?'Sent':'Send'}</div></div>`, 20);
      if (t >= 19.8) msg += el(io(t,19.8,0.3), `<div class="reply">This looks great &mdash; what would it cost?</div>`, 20);
    }
    html = `<div class="page gray-bg"><div class="urlbar"><div>durable.com</div></div><div style="padding:60px 58px">
      ${el(f, `<div class="hero-t">Local businesses<br>near Austin</div><div class="card">${rows}</div>`)}${msg}</div></div>`;
  } else {                             /* payoff (brand section) */
    const f = io(t, 22.8, 0.3);
    const P = [["$500","starter site",false],["$1,500","site + branding",true],["$2,500","site + monthly care",false]];
    let prices = '';
    P.forEach(([amt,per,hot], i) => {
      const pf = io(t, 23.0 + i * 0.4, 0.3);
      if (pf > 0) prices += `<div class="price ${hot?'hot':''}" style="opacity:${pf.toFixed(3)};transform:scale(${(0.85+0.15*pf).toFixed(3)})"><div class="amt">${amt}</div><div class="per">${per}</div></div>`;
    });
    const tally = t >= 24.9 ? el(io(t,24.9,0.3), `<div class="chipline" style="margin-top:56px"><div class="chipp" style="font-size:36px;padding:26px 54px">A FEW CLIENTS = <span>$5K A MONTH</span></div></div>`, 18) : '';
    const wrap = t >= 26.3 ? el(io(t,26.3,0.3), `<div class="chipline" style="margin-top:22px"><div class="chipp">EACH ONE BUILT <span>IN MINUTES</span></div></div>`, 14) : '';
    html = `<div class="page gray-bg"><div class="urlbar"><div>durable.com</div></div><div style="padding:70px 58px">
      ${el(f, `<div class="pay-t">What businesses pay</div><div class="prices">${prices}</div>`)}${tally}${wrap}</div></div>`;
  }
  stage.innerHTML = html;
}
window.seek = (scene, t) => { ({S: sceneS})[scene](t); return true; };
</script>
