<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.15,0.76,"|Claude| can now"],
 [0.76,1.55,"|book flights|"],
 [1.55,2.63,"First, open |Claude|"],
 [2.63,3.87,"go to Customizations"],
 [3.87,4.49,"|Connectors|"],
 [4.49,5.85,"and connect |Turkish Airlines|"],
 [5.85,7.21,"then simply type"],
 [7.21,7.77,"where you want to go"],
 [7.77,8.51,"For example"],
 [8.51,9.37,"I asked Claude to find me"],
 [9.37,10.19,"the |cheapest flights|"],
 [10.19,10.99,"from |London to Dubai|"],
 [10.99,12.01,"in the next 30 days"],
 [12.01,13.17,"and give me the |official link|"],
 [13.17,13.95,"to book it"],
 [13.95,14.53,"|In seconds|"],
 [14.53,15.09,"Claude compares"],
 [15.09,16.67,"multiple |flight options|"],
 [16.67,18.17,"shows you the |cheapest fares|"],
 [18.17,18.63,"flight times"],
 [18.63,19.71,"and |baggage details|"],
 [19.81,21.13,"then gives you the |official link|"],
 [21.13,21.85,"to book"],
 [21.85,22.85,"without searching through"],
 [22.85,23.85,"multiple |travel websites|"],
 [24.16,24.96,"the |Turkish Airlines| part"],
 [25.02,25.56,"might throw you off"],
 [25.84,26.50,"but |ignore that|"],
 [26.66,27.38,"this is a much better way"],
 [27.60,28.74,"to start |booking your flights|"],
 [28.74,30.04,"and it'll |save you a ton of time|"],
 [30.32,31.30,"hope you guys enjoyed this video"],
 [31.52,32.06,"and of course"],
 [32.06,33.10,"|follow along| for our AI tips"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
