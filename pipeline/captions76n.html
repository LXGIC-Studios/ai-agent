<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.10,0.68,"what happens"],
 [0.68,1.38,"when you ask |Claude|"],
 [1.38,2.72,"to make |as much money as possible|"],
 [2.90,4.05,"here's a |3-prompt strategy|"],
 [4.64,5.48,"|prompt number one|"],
 [5.48,7.10,"how do I achieve my |desired income|"],
 [7.10,8.10,"as |quick as possible|"],
 [8.54,9.55,"|prompt number two|"],
 [9.78,11.30,"who's the most |successful entrepreneur|"],
 [11.38,12.70,"I can actually |learn from|"],
 [13.20,13.86,"|prompt number three|"],
 [13.86,15.28,"the |most important prompt|"],
 [15.72,16.94,"pretend you're an |entrepreneur|"],
 [16.94,18.90,"with a |$5,000 upfront budget|"],
 [19.08,20.20,"how do I get my |first client|"],
 [20.66,22.20,"now |sit back and relax|"],
 [22.60,24.56,"Claude gives you a |tailored specific plan|"],
 [24.80,25.90,"directed |to you|"],
 [26.06,27.05,"|not generic advice|"],
 [27.10,28.53,"|prompts in the comments| below"],
 [29.21,29.95,"hope this video |helped you out|"],
 [30.09,30.33,"and of course"],
 [30.35,31.05,"follow along for |more ways|"],
 [31.05,31.81,"to |make money with AI|"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
