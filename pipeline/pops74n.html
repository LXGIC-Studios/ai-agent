<meta charset="utf-8">
<style>
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; }
.row { position:absolute; left:0; width:1080px; display:flex; justify-content:center; gap:24px; }
.chip { background:rgba(11,11,13,0.72); border:1.5px solid rgba(255,255,255,0.22); border-radius:22px;
  padding:22px 38px; font-family:'Archivo'; font-weight:900; font-size:34px; color:#f4f2ee;
  letter-spacing:3px; text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55);
  box-shadow:0 12px 40px rgba(0,0,0,0.45); }
.chip.org { color:#F0A13C; }
.pill-wrap { position:absolute; left:0; width:1080px; display:flex; justify-content:center; }
.pill { background:rgba(11,11,13,0.72); border:1.5px solid rgba(255,255,255,0.22); border-radius:24px;
  padding:28px 50px; font-family:'Archivo'; font-weight:900; font-size:40px; color:#f4f2ee;
  letter-spacing:3.5px; text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55);
  box-shadow:0 12px 44px rgba(0,0,0,0.45); }
.pill .org { color:#F0A13C; }
.cta { background:rgba(58,56,58,0.92); border:none; }
.pw { position:relative; display:inline-block; }
.panel { position:absolute; left:70px; top:430px; width:940px; height:810px;
  background:rgba(13,12,14,0.988); border:1.5px solid rgba(255,255,255,0.2); border-radius:34px;
  box-shadow:0 30px 90px rgba(0,0,0,0.6); }
.cas { position:absolute; left:70px; top:450px; width:940px; height:790px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px; }
.casrow { display:flex; gap:26px; }
.bigcard { position:absolute; left:70px; top:450px; width:940px; height:790px;
  background:#fdfdfc; border-radius:34px; overflow:hidden;
  box-shadow:0 40px 110px rgba(0,0,0,0.65), 0 6px 22px rgba(0,0,0,0.4);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.bigcard .wm { position:absolute; right:14px; top:-52px; font-family:'Archivo'; font-weight:900; font-size:300px;
  color:#f0efec; line-height:1; letter-spacing:-6px; }
.bigcard .h { position:relative; font-family:'Archivo'; font-weight:900; font-size:76px; color:#191919;
  letter-spacing:2px; text-transform:uppercase; line-height:1.15; padding:0 60px; }
.bigcard .h .org { color:#F0A13C; }
.bigcard .sub { position:relative; margin-top:26px; font-family:'Archivo'; font-weight:900; font-size:30px;
  color:#8a867d; letter-spacing:3px; text-transform:uppercase; }
.ring { position:absolute; inset:-4px; border:3px solid rgba(240,161,60,0.85); border-radius:26px; pointer-events:none; }
</style>
<div id="stage"></div>
<script>
// main-clip-local timeline (video trim 0.47); local = raw - 0.47
const CHIPS = [
 {txt:'Business',  t:4.61, row:0},
 {txt:'Finance',   t:5.23, row:0},
 {txt:'Food',      t:5.75, row:0},
 {txt:'Games',     t:6.35, row:1},
 {txt:'Email',     t:6.91, row:1},
 {txt:'Marketing', t:7.43, row:1},
];
const TAG   = {txt:'+ more', t:7.79};
const GRID_OUT = 11.3;
const DASH  = {t:11.99, out:13.95};
const CTA   = {t:21.39};


const stage = document.getElementById('stage');

function pop(lt, d=0.12) {
  if (lt < 0) return null;
  if (lt >= d) return {s:1, o:1};
  const p = lt/d, e = 1-Math.pow(1-p,3);
  let s = 0.78 + 0.28*e;
  if (p > 0.7) s = 1.06 - (p-0.7)/0.3*0.06;
  return {s, o:Math.min(1,p*1.8)};
}
function ringHtml(lt, radius) {
  // expanding outline pulse: 0 -> 0.38s
  if (lt < 0 || lt >= 0.38) return '';
  const p = lt/0.38, e = 1-Math.pow(1-p,2);
  const sc = 1 + 0.38*e, o = 0.85*(1-p);
  return `<div class="ring" style="border-radius:${radius}px;transform:scale(${sc.toFixed(4)});opacity:${o.toFixed(3)}"></div>`;
}
function exitAnim(t, tout, d=0.15) {
  if (t < tout) return {s:1, o:1};
  const p = (t-tout)/d;
  if (p >= 1) return null;
  return {s:1-0.06*p, o:1-p};
}

window.seek = (t) => {
  let html = '';
  if (t < GRID_OUT + 0.15) {
    // all chips always occupy their final slot (visibility toggles) — no reflow jumps
    const rows = [[],[]];
    const ALL = CHIPS.concat([{txt:TAG.txt, t:TAG.t, row:1, org:true}]);
    for (const c of ALL) {
      const ps = pop(t - c.t);
      const ex = exitAnim(t, GRID_OUT);
      if (!ps || !ex) {
        rows[c.row].push(`<div class="pw" style="visibility:hidden"><div class="chip${c.org?' org':''}">${c.txt}</div></div>`);
        continue;
      }
      const s = ps.s*ex.s, o = ps.o*ex.o;
      rows[c.row].push(`<div class="pw" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}"><div class="chip${c.org?' org':''}">${c.txt}</div>${ringHtml(t-c.t,22)}</div>`);
    }
    html += `<div class="row" style="top:104px">${rows[0].join('')}</div>`;
    html += `<div class="row" style="top:232px">${rows[1].join('')}</div>`;
  }
  const cp = pop(t - CTA.t);
  if (cp) html += `<div class="pill-wrap" style="top:92px"><div class="pw" style="transform:scale(${cp.s.toFixed(4)});opacity:${cp.o.toFixed(3)}"><div class="pill cta">Comment <span class="org">&ldquo;GitHub&rdquo;</span></div>${ringHtml(t-CTA.t,24)}</div></div>`;
  stage.innerHTML = html;
  return true;
};
</script>
