<meta charset="utf-8">
<style>
@font-face { font-family:'Anton'; src:url('fonts/Anton-400.ttf'); }
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; }

/* ---- numbered step pill (reference 2) ---- */
.pill-wrap { position:absolute; left:0; top:170px; width:1080px; display:flex; justify-content:center; }
.pill { background:rgba(11,11,13,0.68); border:1.5px solid rgba(255,255,255,0.22); border-radius:24px;
  padding:30px 52px; display:inline-flex; align-items:center; gap:36px;
  box-shadow:0 12px 44px rgba(0,0,0,0.45); }
.pill-num { font-family:'Anton'; font-size:64px; color:#F0A13C; line-height:1; }
.pill-div { width:2px; align-self:stretch; background:rgba(255,255,255,0.18); border-radius:1px; }
.pill-txt .strike { position:relative; }
.pill-txt .strike:after { content:''; position:absolute; left:-6px; right:-6px; top:53%; height:5px; background:#F0A13C; border-radius:3px; transform:rotate(-1.5deg); }
.pill-txt .org { color:#F0A13C; }
.pill-txt { font-family:'Archivo'; font-weight:900; font-size:36px; color:#f4f2ee; line-height:1.38; letter-spacing:4px;
  text-transform:uppercase; text-shadow:0 2px 14px rgba(0,0,0,.55); }

/* ---- expanding pill: grows into the prompt ---- */
.exp-anchor { position:absolute; left:0; top:1080px; width:1080px; display:flex; justify-content:center; }
.exp-panel { background:rgba(11,11,13,0.74); border:1.5px solid rgba(255,255,255,0.22); border-radius:26px;
  box-shadow:0 14px 50px rgba(0,0,0,0.5); overflow:hidden; }
.exp-panel.hot { border-color:rgba(240,161,60,0.65); }
.exp-head { display:inline-flex; align-items:center; gap:36px; padding:30px 52px; white-space:nowrap; }
.exp-div { height:1.5px; background:rgba(255,255,255,0.16); margin:0 40px; }
.exp-body { padding:26px 48px 36px; font-family:'Inter'; font-weight:600; font-size:34px; color:#eceae4;
  line-height:1.5; width:880px; }
.exp-body .q { color:#8a867d; }

/* ---- combo: pill docks top, big card center ---- */
.pill-top { position:absolute; left:0; width:1080px; display:flex; justify-content:center; }
.card-big-wrap { position:absolute; left:60px; width:960px; top:430px; }
.card-big { position:relative; background:#fdfdfc; border-radius:34px; padding:66px 64px; overflow:hidden;
  box-shadow:0 40px 110px rgba(0,0,0,0.65), 0 6px 22px rgba(0,0,0,0.4); }
.card-big.hot { box-shadow:0 40px 110px rgba(0,0,0,0.65), 0 0 0 6px #F0A13C; }
.card-big .card-wm { font-size:330px; top:-58px; right:22px; }
.card-big .card-badge { font-size:32px; padding:16px 32px; }
.card-big .card-app { font-size:32px; }
.card-big .card-body { font-size:52px; line-height:1.45; }

/* ---- floating prompt card (reference 1) ---- */
.card-wrap { position:absolute; left:50%; top:1000px; width:880px; }
.card { position:relative; background:#fdfdfc; border-radius:28px; padding:50px 56px; overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,0.6), 0 4px 18px rgba(0,0,0,0.35); }
.card.hot { box-shadow:0 30px 90px rgba(0,0,0,0.6), 0 0 0 5px #F0A13C; }
.card-wm { position:absolute; right:18px; top:-38px; font-family:'Anton'; font-size:230px; color:#f0efec;
  line-height:1; letter-spacing:-4px; z-index:0; }
.card-head { position:relative; z-index:1; display:flex; align-items:center; gap:22px; margin-bottom:24px; }
.card-badge { background:#1f1e1c; color:#fff; font-family:'Archivo'; font-weight:900; font-size:27px;
  letter-spacing:3px; padding:12px 26px; border-radius:12px; }
.card-badge.hot { background:#F0A13C; color:#1f1e1c; }
.card-app { color:#8a867d; font-family:'Inter'; font-weight:600; font-size:27px; }
.card-body { position:relative; z-index:1; font-family:'Inter'; font-weight:600; font-size:38px; color:#191919; line-height:1.42; }
.card-body .q { color:#b0b0ab; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');

const PILLS = {
  t1: ["", "USING <span class='org'>CLAUDE</span> TO BOOK FLIGHTS"],
  t2: ["", "CHINA'S NEW <span class='org'>OPEN SOURCE</span> AI"],
  t3: ["", "HUNDREDS OF <span class='org'>FREE APIs</span>"],
  cta74: ["", "COMMENT <span class='org'>&ldquo;GITHUB&rdquo;</span>"],
  p1: ["01", "THE FASTEST PATH"],
  p2: ["02", "THE RIGHT MENTOR"],
  p3: ["03", "THE MOST IMPORTANT"],
  x1: ["", "<span class='strike'>GENERIC ADVICE</span>"],
  x2: ["", "TAILORED. SPECIFIC. <span class='org'>YOURS.</span>"],
  cta: ["", "PROMPTS IN THE <span class='org'>COMMENTS</span>"]
};
const CARDS = {
  c1: ["PROMPT 01", "01", "What is the fastest way for me to reach my desired income?", false],
  c2: ["PROMPT 02", "02", "Who is the most successful entrepreneur I should learn from?", false],
  c3: ["PROMPT 03", "03", "Pretend you are that entrepreneur. Create me a 90-day action plan with a $5,000 upfront budget, and show me exactly how to get my first client.", true]
};

// pop animation: scale/fade in with overshoot, subtle idle drift, no exit (cut out)
function anim(t) {
  const IN = 0.32;
  let s, o, dy;
  if (t < IN) {
    const p = t / IN;
    const e = 1 - Math.pow(1 - p, 4);            // ease-out quart, no bounce
    s = 0.965 + 0.035 * e;
    o = e;
    dy = 30 * (1 - e);
  } else {
    s = 1.0; o = 1; dy = 0;                       // dead still = elegant
  }
  return { s, o, dy };
}

const COMBOS = {
  k1: { pill:'p1', card:'c1', tCard:1.30 },
  k2: { pill:'p2', card:'c2', tCard:1.70 },
  k3: { pill:'p3', card:'c3', tCard:2.95 }
};
function ease(p) { return 1 - Math.pow(1 - Math.min(1, Math.max(0, p)), 3); }
function comboSeek(kind, t, dur) {
  const { pill, card, tCard } = COMBOS[kind];
  const [num, txt] = PILLS[pill];
  const [badge, wm, body, hot] = CARDS[card];
  let out = 1;
  if (dur && t > dur - 0.22) out = 1 - (t - (dur - 0.22)) / 0.22;
  // pill: pops at chest, glides to top when card arrives
  const pin = ease(t / 0.32);
  const glide = ease((t - tCard) / 0.38);
  const py = 1100 - 930 * glide;
  const pOp = Math.min(pin, out ?? 1) * out;
  let html = `<div class="pill-top" style="top:${py.toFixed(1)}px; opacity:${(pin*out).toFixed(3)}; transform:translateY(${(30*(1-pin)).toFixed(1)}px)">
    <div class="pill">${num ? `<div class="pill-num">${num}</div><div class="pill-div"></div>` : ''}<div class="pill-txt">${txt}</div></div></div>`;
  // big card scales up after tCard
  if (t >= tCard) {
    const cin = ease((t - tCard) / 0.40);
    const cs = 0.82 + 0.18 * cin;
    html += `<div class="card-big-wrap" style="opacity:${(cin*out).toFixed(3)}; transform:scale(${cs.toFixed(4)}) translateY(${(70*(1-cin)).toFixed(1)}px)">
      <div class="card-big ${hot?'hot':''}"><div class="card-wm">${wm}</div>
      <div class="card-head"><div class="card-badge ${hot?'hot':''}">${badge}</div><div class="card-app">Claude</div></div>
      <div class="card-body"><span class="q">&ldquo;</span>${body}<span class="q">&rdquo;</span></div></div></div>`;
  }
  stage.innerHTML = html;
}
const EXPANDS = {
  e1: { pill:'p1', tExp:1.30, body:"What is the fastest way for me to reach my desired income?", hot:false },
  e2: { pill:'p2', tExp:1.70, body:"Who is the most successful entrepreneur I should learn from?", hot:false },
  e3: { pill:'p3', tExp:2.95, body:"Pretend you are that entrepreneur. Create me a 90-day action plan with a $5,000 upfront budget, and show me exactly how to get my first client.", hot:true }
};
function measure(html, width) {
  const el = document.createElement('div');
  el.style.cssText = `position:absolute;left:-3000px;top:0;${width ? 'width:'+width+'px;' : ''}`;
  el.innerHTML = html;
  document.body.appendChild(el);
  const r = el.firstElementChild.getBoundingClientRect();
  document.body.removeChild(el);
  return { w: r.width, h: r.height };
}
function expandSeek(kind, t, dur) {
  const { pill, tExp, body, hot } = EXPANDS[kind];
  const [num, txt] = PILLS[pill];
  let out = 1;
  if (dur && t > dur - 0.22) out = Math.max(0, 1 - (t - (dur - 0.22)) / 0.22);
  const pin = ease(t / 0.32);
  const e = t < tExp ? 0 : ease((t - tExp) / 0.48);
  const headHtml = `<div class="exp-head"><div class="pill-num">${num}</div><div class="pill-div"></div><div class="pill-txt">${txt}</div></div>`;
  const bodyHtml = `<div class="exp-div"></div><div class="exp-body"><span class="q">&ldquo;</span>${body}<span class="q">&rdquo;</span></div>`;
  const collapsed = measure(`<div class="exp-panel" style="display:inline-block">${headHtml}</div>`);
  const expanded = measure(`<div class="exp-panel" style="display:inline-block;width:960px">${headHtml}${bodyHtml}</div>`, 1080);
  const w = collapsed.w + (960 - collapsed.w) * e;
  const h = collapsed.h + (expanded.h - collapsed.h) * e;
  const bodyOp = Math.max(0, (e - 0.35) / 0.65);
  stage.innerHTML = `<div class="exp-anchor" style="opacity:${(pin*out).toFixed(3)}; transform:translateY(${(30*(1-pin)).toFixed(1)}px)">
    <div class="exp-panel ${hot?'hot':''}" style="width:${w.toFixed(1)}px; height:${h.toFixed(1)}px">
      ${headHtml}<div style="opacity:${bodyOp.toFixed(3)}">${bodyHtml}</div></div></div>`;
}
window.seek = (kind, t, dur) => {
  if (EXPANDS[kind]) { expandSeek(kind, t, dur); return true; }
  if (COMBOS[kind]) { comboSeek(kind, t, dur); return true; }
  let { s, o, dy } = anim(t);
  if (dur && t > dur - 0.22) {
    const p = (t - (dur - 0.22)) / 0.22;
    o = o * (1 - p);
  }
  if (PILLS[kind]) {
    const [num, txt] = PILLS[kind];
    const numHtml = num ? `<div class="pill-num">${num}</div><div class="pill-div"></div>` : '';
    const just = num ? '' : 'justify-content:center;text-align:center;';
    stage.innerHTML = `<div class="pill-wrap" style="transform:translateY(${dy.toFixed(1)}px) scale(${s.toFixed(4)}); opacity:${o.toFixed(3)}">
      <div class="pill" style="${just}">${numHtml}<div class="pill-txt">${txt}</div></div></div>`;
  } else {
    const [badge, wm, body, hot] = CARDS[kind];
    stage.innerHTML = `<div class="card-wrap" style="transform:translateX(-50%) translateY(${dy.toFixed(1)}px) scale(${s.toFixed(4)}); opacity:${o.toFixed(3)}">
      <div class="card ${hot?'hot':''}"><div class="card-wm">${wm}</div>
      <div class="card-head"><div class="card-badge ${hot?'hot':''}">${badge}</div><div class="card-app">Claude</div></div>
      <div class="card-body"><span class="q">&ldquo;</span>${body}<span class="q">&rdquo;</span></div></div></div>`;
  }
  return true;
};
</script>
