<meta charset="utf-8">
<style>
@font-face { font-family:'Archivo'; src:url('fonts/Archivo-900.ttf'); font-weight:900; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-600.ttf'); font-weight:600; }
@font-face { font-family:'Inter'; src:url('fonts/Inter-400.ttf'); font-weight:400; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; background:#0f0e11; overflow:hidden; }
#stage { width:1080px; height:1920px; position:relative; padding:64px 44px 0; font-family:'Inter';
  background:radial-gradient(ellipse 130% 55% at 50% -6%, #211e26 0%, #0f0e11 58%),
             radial-gradient(ellipse 80% 40% at 90% 110%, #17151c 0%, #0f0e11 60%); }
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; }
.brand { display:flex; align-items:center; gap:16px; }
.bdot { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#F0A13C,#c9702e);
  display:flex; align-items:center; justify-content:center; font-family:'Archivo'; font-weight:900; font-size:22px; color:#171519; }
.bname { font-family:'Archivo'; font-weight:900; font-size:32px; color:#f4f2ee; letter-spacing:2px; text-transform:uppercase; }
.bsub { font-size:19px; color:#7d7a72; margin-top:2px; }
.live { display:flex; align-items:center; gap:11px; background:rgba(74,222,128,0.10); border:1.5px solid rgba(74,222,128,0.4);
  border-radius:999px; padding:10px 22px; font-weight:600; font-size:20px; color:#4ade80; letter-spacing:1.5px; }
.dot { width:12px; height:12px; border-radius:50%; background:#4ade80; }
.grid { display:flex; flex-direction:column; gap:20px; }
.row { display:flex; gap:20px; }
.card { background:rgba(255,255,255,0.045); border:1.5px solid rgba(255,255,255,0.10); border-radius:20px; padding:22px 24px; }
.card .lab { font-size:17px; color:#7d7a72; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }
.kpi { flex:1; }
.kpi .val { font-family:'Archivo'; font-weight:900; font-size:40px; color:#f4f2ee; margin-top:8px; letter-spacing:0.5px; }
.kpi .chip { display:inline-block; margin-top:8px; font-size:16px; font-weight:600; color:#4ade80;
  background:rgba(74,222,128,0.10); border-radius:999px; padding:3px 12px; }
.kpi svg { margin-top:10px; display:block; }
.big { flex:2.1; }
.side { flex:1; display:flex; flex-direction:column; gap:20px; }
.side .card { flex:1; }
.side .val { font-family:'Archivo'; font-weight:900; font-size:34px; color:#f4f2ee; margin-top:8px; }
.side .d { font-size:16px; color:#4ade80; margin-top:5px; font-weight:600; }
.bar { display:flex; align-items:center; gap:13px; margin-top:13px; }
.bar .bn { font-size:18px; color:#e8e6e0; font-weight:600; width:132px; white-space:nowrap; overflow:hidden; }
.bar .bt { flex:1; height:20px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden; }
.bar .bf { height:100%; border-radius:6px; background:linear-gradient(90deg,#c97f2e,#F0A13C); }
.bar .bv { font-family:'Archivo'; font-weight:900; font-size:17px; color:#F0A13C; width:66px; text-align:right; }
.leg { font-size:17px; color:#7d7a72; display:flex; flex-direction:column; gap:8px; }
.leg b { color:#e8e6e0; font-weight:600; }
.sw { display:inline-block; width:14px; height:14px; border-radius:4px; margin-right:8px; vertical-align:-1px; }
.frow { display:flex; align-items:center; gap:12px; margin-top:13px; }
.frow .t { font-size:18px; color:#e8e6e0; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; }
.frow .v { font-family:'Archivo'; font-weight:900; font-size:19px; color:#F0A13C; }
.frow .st { font-size:14px; font-weight:600; color:#4ade80; background:rgba(74,222,128,0.10); border-radius:999px; padding:2px 10px; }
.goalrow { display:flex; align-items:center; gap:16px; margin-top:14px; }
.goalrow .gt { flex:1; height:22px; border-radius:7px; background:rgba(255,255,255,0.06); overflow:hidden; }
.goalrow .gf { height:100%; border-radius:7px; background:linear-gradient(90deg,#3f8f5a,#4ade80); }
.goalrow .gv { font-family:'Archivo'; font-weight:900; font-size:24px; color:#4ade80; width:82px; text-align:right; }
.loc { display:flex; align-items:center; gap:12px; margin-top:12px; font-size:18px; color:#e8e6e0; font-weight:600; }
.loc .lt { flex:1; height:14px; border-radius:5px; background:rgba(255,255,255,0.06); overflow:hidden; }
.loc .lf { height:100%; border-radius:5px; background:#7aa2f7; }
.loc .ln { width:96px; } .loc .lv { width:54px; text-align:right; color:#7d7a72; font-size:16px; }
</style>
<div id="stage"></div>
<script>
function fmt(n){ return n.toLocaleString('en-US'); }
function ez(p){ return 1-Math.pow(1-Math.max(0,Math.min(1,p)),3); }
const stage=document.getElementById('stage');

const PTS=[[0,128],[48,118],[96,122],[144,101],[192,107],[240,82],[288,88],[336,63],[384,71],[432,50],[480,56],[528,34],[576,42],[624,19]];
const LIVE=[[656,27],[684,12],[700,20]];
function bigChart(t){
  const W=704,H=140, prog=ez(t/1.5);
  let pts=PTS.filter(p=>p[0]<=prog*624);
  LIVE.forEach((p,i)=>{ if(t>3.0+0.3*i) pts=pts.concat([p]); });
  if(pts.length<2) return `<svg width="${W}" height="${H}"></svg>`;
  const line=pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
  const last=pts[pts.length-1];
  let grid='';
  for(const gy of [35,70,105]) grid+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${grid}
    <path d="${line} L${last[0]},${H} L0,${H} Z" fill="rgba(240,161,60,0.13)"/>
    <path d="${line}" stroke="#F0A13C" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="7" fill="#F0A13C"/></svg>`;
}
function spark(t,seed,col){
  const pts=[[0,22],[16,17],[32,19],[48,12],[64,14],[80,7],[96,10],[112,3]].map(([x,y],i)=>[x,Math.max(2,Math.min(24,y+((seed*7+i*3)%8)-3))]);
  const vis=pts.filter(p=>p[0]<=ez((t-0.3)/0.9)*112);
  if(vis.length<2) return '<svg width="112" height="26"></svg>';
  return `<svg width="112" height="26"><path d="${vis.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ')}" stroke="${col}" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`;
}
function donut(t){
  const p=ez((t-4.8)/0.8), R=62, C=2*Math.PI*R;
  const segs=[[0.46,'#F0A13C'],[0.32,'#7aa2f7'],[0.22,'#4ade80']];
  let off=0,out='';
  for(const [f,c] of segs){
    const len=C*f*p;
    out+=`<circle r="${R}" cx="88" cy="88" fill="none" stroke="${c}" stroke-width="26" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 88 88)"/>`;
    off+=C*f*p;
  }
  return `<svg width="176" height="176">${out}</svg>`;
}
function hours(t){
  const hs=[34,48,42,66,58,84,92,74,100,88,112,96];
  let out='';
  hs.forEach((h,i)=>{
    const hh=ez((t-5.7-0.06*i)/0.4)*h;
    out+=`<rect x="${i*58}" y="${118-hh}" width="40" height="${hh}" rx="7" fill="${i===10?'#F0A13C':'rgba(240,161,60,0.45)'}"/>`;
  });
  return `<svg width="700" height="120" viewBox="0 0 700 120">${out}</svg>`;
}

window.seek=(t)=>{
  const rev=4832+Math.round(ez(t/7.5)*1284);
  const ord=118+Math.round(ez(t/7.5)*36);
  const vis=892+Math.round(ez(t/7.5)*263);
  const cvr=(3.2+ez(t/7.5)*0.6).toFixed(1);
  const pulse=0.55+0.45*Math.abs(Math.sin(t*Math.PI*1.6));
  const orders=[["Latte bundle","$64.00",0.8],["Subscription","$29.00",1.6],["Espresso kit","$89.00",6.9],["Beans x2","$36.00",7.5]];
  let feed='';
  for(const [n,v,tin] of orders.slice().reverse()){
    if(t<tin) continue;
    const lt=t-tin; let s=1,o=1;
    if(lt<0.12){const p=lt/0.12;s=0.92+0.08*ez(p);o=Math.min(1,p*1.8);}
    feed+=`<div class="frow" style="transform:scale(${s.toFixed(3)});opacity:${o.toFixed(3)}"><span class="t">${n}</span><span class="v">${v}</span><span class="st">Paid</span></div>`;
  }
  const pct=62+Math.round(ez((t-5.9)/1.4)*38);
  const locs=[["New York",0.86,"$2.1k"],["Los Angeles",0.64,"$1.6k"],["Chicago",0.45,"$1.1k"]];
  let lhtml='';
  locs.forEach((l,i)=>{
    const w=ez((t-1.0-0.15*i)/0.7)*l[1]*100;
    lhtml+=`<div class="loc"><span class="ln">${l[0]}</span><div class="lt"><div class="lf" style="width:${w.toFixed(1)}%"></div></div><span class="lv">${l[2]}</span></div>`;
  });
  const bars=[["Latte bundle",0.92,"$1,890"],["Espresso kit",0.71,"$1,462"],["Beans 1kg",0.55,"$1,133"],["Gift cards",0.38,"$782"]];
  let bhtml='';
  bars.forEach((b,i)=>{
    const w=ez((t-3.9-0.12*i)/0.5)*b[1]*100;
    bhtml+=`<div class="bar"><span class="bn">${b[0]}</span><div class="bt"><div class="bf" style="width:${w.toFixed(1)}%"></div></div><span class="bv">${b[2]}</span></div>`;
  });
  stage.innerHTML=`
  <div class="topbar">
    <div class="brand"><div class="bdot">C</div><div><div class="bname">Coffee Co.</div><div class="bsub">Overview &middot; today</div></div></div>
    <div class="live"><div class="dot" style="opacity:${pulse.toFixed(2)}"></div>LIVE</div>
  </div>
  <div class="grid">
    <div class="row">
      <div class="card kpi"><div class="lab">Revenue</div><div class="val">$${fmt(rev)}</div><div class="chip">+12.4%</div>${spark(t,1,'#F0A13C')}</div>
      <div class="card kpi"><div class="lab">Orders</div><div class="val">${ord}</div><div class="chip">+9/hr</div>${spark(t,2,'#7aa2f7')}</div>
      <div class="card kpi"><div class="lab">Visitors</div><div class="val">${fmt(vis)}</div><div class="chip">live</div>${spark(t,3,'#4ade80')}</div>
      <div class="card kpi"><div class="lab">Conversion</div><div class="val">${cvr}%</div><div class="chip">+0.4</div>${spark(t,4,'#F0A13C')}</div>
    </div>
    <div class="row">
      <div class="card big"><div class="lab">Revenue &mdash; last 24h</div><div style="margin-top:14px">${bigChart(t)}</div></div>
      <div class="side">
        <div class="card"><div class="lab">Avg order</div><div class="val">$41.20</div><div class="d">+3.1% today</div></div>
        <div class="card"><div class="lab">Refund rate</div><div class="val">0.6%</div><div class="d">all-time low</div></div>
      </div>
    </div>
    <div class="row">
      <div class="card" style="flex:1.35"><div class="lab">Top products</div>${bhtml}</div>
      <div class="card" style="flex:1"><div class="lab">Traffic</div>
        <div style="display:flex;align-items:center;gap:16px;margin-top:10px">${donut(t)}
        <div class="leg"><span><span class="sw" style="background:#F0A13C"></span><b>46%</b> social</span>
        <span><span class="sw" style="background:#7aa2f7"></span><b>32%</b> search</span>
        <span><span class="sw" style="background:#4ade80"></span><b>22%</b> direct</span></div></div></div>
    </div>
    <div class="row">
      <div class="card" style="flex:1.35"><div class="lab">Sales by hour</div><div style="margin-top:14px">${hours(t)}</div></div>
      <div class="card" style="flex:1"><div class="lab">Recent orders</div>${feed}</div>
    </div>
    <div class="row">
      <div class="card" style="flex:1.35"><div class="lab">Monthly goal</div>
        <div class="goalrow"><div class="gt"><div class="gf" style="width:${pct}%"></div></div><div class="gv">${pct}%</div></div></div>
      <div class="card" style="flex:1"><div class="lab">Top locations</div>${lhtml}</div>
    </div>
  </div>`;
  return true;
};
</script>
