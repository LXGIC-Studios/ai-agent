<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.20,0.57,"What happens"],
 [0.57,1.07,"when you ask"],
 [1.07,1.45,"|Claude|"],
 [1.45,2.43,"as much |money|"],
 [2.43,3.20,"as possible?"],
 [3.47,3.81,"here's the"],
 [3.81,5.10,"|3-prompt strategy|"],
 [5.29,6.41,"Prompt number |one|"],
 [6.41,7.11,"How do I achieve"],
 [7.11,7.99,"my |desired income|"],
 [7.99,8.90,"as quick as possible?"],
 [9.71,10.57,"Prompt number |two|"],
 [11.41,12.09,"Which |entrepreneur|"],
 [12.09,13.25,"is the most successful"],
 [13.25,13.71,"that I could"],
 [13.71,14.75,"actually |learn from|"],
 [15.17,15.98,"And prompt number |three|"],
 [16.03,16.41,"this is gonna be"],
 [16.41,17.09,"the |most important|"],
 [17.09,17.59,"prompt"],
 [18.17,19.43,"|Pretend you're an entrepreneur|"],
 [19.53,19.93,"You have a"],
 [19.93,21.15,"|$5,000| upfront budget"],
 [22.09,22.69,"How do I get"],
 [22.69,23.60,"my |first client|?"],
 [23.95,25.21,"What Claude's going to do here"],
 [25.21,25.93,"Claude's |not| going to"],
 [25.93,26.59,"give you |generic advice|"],
 [26.59,27.75,"He's going to give you"],
 [27.75,29.41,"a |tailored, specific plan|"],
 [29.41,30.55,"towards |your goals|"],
 [30.71,31.20,"I hope this video"],
 [31.20,31.80,"helped you out"],
 [31.80,32.22,"and I'll make sure"],
 [32.28,32.84,"to put |those prompts|"],
 [32.84,33.60,"in the |comments below|"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
