<meta charset="utf-8">
<style>
@font-face { font-family:'Montserrat'; src:url('fonts/Montserrat-800.ttf'); font-weight:800; }
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:400px; background:transparent; overflow:hidden; }
#stage { width:1080px; height:400px; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; }
.bub { background:rgba(16,15,17,0.88); border:2px solid rgba(255,255,255,0.16); border-radius:30px;
  padding:28px 52px; max-width:960px; text-align:center;
  box-shadow:0 14px 44px rgba(0,0,0,0.5); }
.bub span { font-family:'Montserrat'; font-weight:800; font-size:60px; line-height:1.28; color:#fff; letter-spacing:0.5px; }
.bub .org { color:#F0A13C; }
</style>
<div id="stage"></div>
<script>
const stage = document.getElementById('stage');
const CHUNKS = [
 [0.15,0.76,"|Claude| can now"],
 [0.76,1.78,"|book flights|"],
 [1.78,2.86,"First, open |Claude|"],
 [2.86,4.10,"go to Customizations"],
 [4.10,4.72,"|Connectors|"],
 [4.72,6.08,"and connect |Turkish Airlines|"],
 [6.08,7.44,"then simply type"],
 [7.44,8.00,"where you want to go"],
 [8.00,8.74,"For example"],
 [8.74,9.60,"I asked Claude to find me"],
 [9.60,10.42,"the |cheapest flights|"],
 [10.42,11.22,"from |London to Dubai|"],
 [11.22,12.24,"in the next 30 days"],
 [12.24,13.40,"and give me the |official link|"],
 [13.40,14.18,"to book it"],
 [14.18,14.76,"|In seconds|"],
 [14.76,15.32,"Claude compares"],
 [15.32,16.90,"multiple |flight options|"],
 [16.90,18.40,"shows you the |cheapest fares|"],
 [18.40,18.86,"flight times"],
 [18.86,19.94,"and |baggage details|"],
 [20.04,21.36,"then gives you the |official link|"],
 [21.36,22.08,"to book"],
 [22.08,23.08,"without searching through"],
 [23.08,23.88,"multiple |travel websites|"],
 [24.14,24.94,"the |Turkish Airlines| part"],
 [25.00,25.54,"might throw you off"],
 [25.82,26.48,"but |ignore that|"],
 [26.64,27.36,"this is a much better way"],
 [27.58,28.72,"to start |booking your flights|"],
 [28.72,30.02,"and it'll |save you a ton of time|"],
 [30.30,31.28,"hope you guys enjoyed this video"],
 [31.50,32.04,"and of course"],
 [32.04,33.03,"|follow along| for our AI tips"]
];

function fmt(txt) {
  const parts = txt.split('|');
  let out = '';
  parts.forEach((seg, i) => { if (seg) out += i % 2 ? `<span class="org">${seg}</span>` : `<span>${seg}</span>`; });
  return out;
}

window.seek = (t) => {
  const c = CHUNKS.find(([s, e]) => t >= s && t < e);
  if (!c) { stage.innerHTML = ''; return true; }
  const lt = t - c[0];
  let s, o;
  if (lt < 0.12) {
    const p = lt / 0.12;
    const e = 1 - Math.pow(1 - p, 3);
    s = 0.78 + 0.28 * e;                       // 0.78 -> 1.06
    if (p > 0.7) s = 1.06 - (p - 0.7) / 0.3 * 0.06;
    o = Math.min(1, p * 1.8);
  } else { s = 1.0; o = 1; }
  stage.innerHTML = `<div class="bub" style="transform:scale(${s.toFixed(4)});opacity:${o.toFixed(3)}">${fmt(c[2])}</div>`;
  return true;
};
</script>
